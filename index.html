    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .tp-summary-pill.neon { background: rgba(128,229,92,0.10); }
  .tp-summary-pill.purple { background: rgba(126,84,217,0.10); }
  .tp-summary-pill.citrine { background: rgba(247,231,75,0.10); }
  .tp-summary-pill-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .tp-summary-pill-label {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
  }
  .tp-summary-pill-value {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    line-height: 1;
  }
  .tp-group-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 2px 7px; cursor: pointer; user-select: none;
  }
  .tp-group-head-label {
    font-family: var(--font-subheading);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .tp-group-body {
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .tp-group-row { padding: 12px 14px; border-bottom: 1px solid var(--card-border); }
  .tp-group-row:last-child { border-bottom: none; }
  .tp-group-row-main {
    display: grid; grid-template-columns: 32px 1fr auto;
    align-items: center; gap: 10px;
  }
  .tp-group-row-icon {
    height: 32px; width: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .tp-group-row-icon.neon { background: rgba(128,229,92,0.12); color: #3db832; }
  .tp-group-row-icon.purple { background: rgba(126,84,217,0.13); color: #7E54D9; }
  .tp-group-row-icon.citrine { background: rgba(247,231,75,0.12); color: #b8930b; }
  .tp-group-row-title {
    font-family: var(--font-subheading);
    font-size: 11px; font-weight: 600;
    color: var(--text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tp-group-row-desc {
    font-size: 10px; color: var(--text-tertiary);
  }
  .tp-group-row-count {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    text-align: right;
    line-height: 1;
  }
  .tp-group-row-count.neon { color: #3db832; }
  .tp-group-row-count.purple { color: #7E54D9; }
  .tp-group-row-count.citrine { color: #b8930b; }
  .tp-group-row-amt {
    display: grid; grid-template-columns: 1fr auto;
    align-items: center;
    padding: 6px 10px; border-radius: 6px; margin-top: 8px;
    background: var(--input-bg);
  }

  /* ── Vehicle rows ──────────────────────────────────────────────────── */
  .tp-group-row-icon.amber { background: rgba(205,110,20,0.11); color: #c96a10; }
  .tp-vehicle-row { position: relative; padding: 14px; }
  .tp-vehicle-row:hover .tp-vehicle-remove-btn { opacity: 1; }

  /* Header: full-width VIN + remove */
  .tp-vehicle-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--card-border);
    margin-bottom: 10px;
  }
  .tp-vehicle-vin {
    font-family: monospace;
    font-size: 11.5px; font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    line-height: 1.4;
    word-break: break-all;
    flex: 1;
  }
  .tp-vehicle-vin .tp-vehicle-ymm-inline {
    font-family: var(--font-subheading);
    font-size: 12px; font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0;
  }

  /* Body: icon+badge column / date list column */
  .tp-vehicle-body {
    display: grid;
    grid-template-columns: 54px 1fr;
    gap: 14px;
    align-items: flex-start;
  }
  .tp-vehicle-icon-col {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .tp-vehicle-icon-col .tp-group-row-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
  }
  .tp-vehicle-badge {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 20px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    line-height: 1.4;
    width: 100%;
    text-align: center;
  }
  .tp-vehicle-badge.owned {
    background: rgba(61,184,50,0.13);
    color: #2a9020;
    border-color: rgba(61,184,50,0.28);
  }
  .tp-vehicle-badge.owned:hover { background: rgba(61,184,50,0.22); }
  .tp-vehicle-badge.traded {
    background: rgba(156,150,174,0.13);
    color: var(--text-tertiary);
    border-color: rgba(156,150,174,0.25);
  }
  .tp-vehicle-badge.traded:hover { background: rgba(156,150,174,0.22); }

  /* Dates: label: value on same line */
  .tp-vehicle-dates {
    display: flex; flex-direction: column; gap: 7px;
  }
  .tp-vehicle-date-item {
    display: flex; flex-direction: row; align-items: baseline;
    justify-content: space-between; gap: 6px;
    min-width: 0;
  }
  .tp-vehicle-date-lbl {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-tertiary);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tp-vehicle-date-val {
    font-family: var(--font-subheading);
    font-size: 11px; font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    text-align: right;
  }
  .tp-vehicle-date-val.empty { color: var(--text-tertiary); font-weight: 500; }
  .tp-vehicle-remove-btn {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.12s, background 0.12s, color 0.12s;
    padding: 0;
    flex-shrink: 0;
  }
  .tp-vehicle-remove-btn:hover { background: rgba(239,68,68,0.10); color: #ef4444; border-color: rgba(239,68,68,0.25); }
  /* + button next to group head */
  .tp-group-head-actions { display: flex; align-items: center; gap: 7px; }
  .tp-add-vehicle-btn {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-tertiary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    padding: 0;
  }
  .tp-add-vehicle-btn:hover { background: var(--accent-light); color: var(--accent); border-color: rgba(94,16,188,0.3); }
  /* Add-vehicle inline form */
  .tp-add-vehicle-form {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--input-bg);
    display: flex; flex-direction: column; gap: 8px;
  }
  .tp-avf-row { display: grid; gap: 6px; }
  .tp-avf-2col { grid-template-columns: 1fr 1fr; }
  .tp-avf-3col { grid-template-columns: 1fr 1fr 1fr; }
  .tp-avf-group { display: flex; flex-direction: column; gap: 2px; }
  .tp-avf-label {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .tp-avf-input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 5px 8px;
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-primary);
    outline: none;
  }
  .tp-avf-input:focus { border-color: var(--accent); }
  .tp-avf-input::placeholder { color: var(--text-tertiary); }
  .tp-avf-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 2px; }
  .tp-avf-btn-cancel {
    padding: 5px 10px;
    font-size: 11px; font-family: var(--font-subheading); font-weight: 600;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    border-radius: 5px; cursor: pointer;
    transition: background 0.12s;
  }
  .tp-avf-btn-cancel:hover { background: var(--card-bg); }
  .tp-avf-btn-add {
    padding: 5px 12px;
    font-size: 11px; font-family: var(--font-subheading); font-weight: 600;
    border: none;
    background: var(--accent); color: #fff;
    border-radius: 5px; cursor: pointer;
    transition: background 0.12s;
  }
  .tp-avf-btn-add:hover { background: var(--accent-dark); }
  .tp-avf-btn-add:disabled { opacity: 0.45; cursor: default; }

  /* ── Associated Contacts ───────────────────────────────────────────── */
  .tp-group-row-icon.azure { background: rgba(42,111,219,0.12); color: #2a6fdb; }

  /* Card stack — independent bordered cards with breathing room between them */
  .tp-assoc-stack {
    display: flex; flex-direction: column;
    gap: 12px;
    margin-bottom: 14px;
  }
  .tp-contact-card {
    position: relative;
    padding: 14px;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: var(--card-bg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .tp-contact-card:hover .tp-vehicle-remove-btn { opacity: 1; }
  /* When the add-contact form sits in the stack, drop its inherited top border */
  .tp-assoc-stack .tp-add-vehicle-form { border-top: none; }

  /* Vehicle "Shared" badge — used in the Vehicles group for vehicles
     shared in from another associated contact. */
  .tp-vehicle-badge.shared {
    background: rgba(42,111,219,0.12);
    color: #2a6fdb;
    border-color: rgba(42,111,219,0.28);
    cursor: default;
  }
  .tp-vehicle-shared-note {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 600;
    color: #2a6fdb;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-top: 3px;
    display: flex; align-items: center; gap: 4px;
  }
  .tp-contact-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--card-border);
  }
  .tp-contact-av {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-subheading);
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .tp-contact-name {
    font-family: var(--font-subheading);
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .tp-contact-phone {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: monospace;
    margin-top: 2px;
  }
  .tp-contact-props {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 12px;
  }
  .tp-contact-prop-row {
    display: grid;
    grid-template-columns: 16px auto 1fr;
    align-items: center;
    gap: 6px;
    min-height: 24px;
  }
  .tp-contact-prop-icon {
    color: var(--text-tertiary);
    display: flex; align-items: center; justify-content: center;
  }
  .tp-contact-prop-lbl {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary);
  }
  .tp-contact-prop-val {
    font-family: var(--font-subheading);
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    text-align: left;
    width: 100%;
    min-width: 0;
    min-height: 26px;
    transition: background 0.12s, border-color 0.12s;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tp-contact-prop-val:hover {
    background: var(--input-bg);
    border-color: var(--border);
  }
  .tp-contact-prop-val.empty { color: var(--text-tertiary); font-style: italic; font-weight: 400; }
  .tp-contact-prop-input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: var(--font-subheading);
    color: var(--text-primary);
    outline: none;
    min-height: 26px;
    box-shadow: 0 0 0 3px rgba(94,16,188,0.12);
  }

  /* Shared vehicles sub-section */
  .tp-contact-shared {
    border-top: 1px solid var(--card-border);
    padding-top: 12px;
  }
  .tp-contact-shared-lbl {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .tp-contact-share-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    border: 1px solid var(--card-border);
    margin-bottom: 5px;
    background: var(--card-bg);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .tp-contact-share-row:hover { background: var(--input-bg); }
  .tp-contact-share-row.is-shared {
    background: rgba(42,111,219,0.06);
    border-color: rgba(42,111,219,0.25);
  }
  .tp-contact-share-row:last-child { margin-bottom: 0; }
  .tp-contact-share-check {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--text-tertiary);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #fff;
  }
  .tp-contact-share-row.is-shared .tp-contact-share-check {
    background: #2a6fdb;
    border-color: #2a6fdb;
  }
  .tp-contact-share-text {
    display: flex; flex-direction: column; gap: 1px;
    flex: 1; min-width: 0;
  }
  .tp-contact-share-ymm {
    font-family: var(--font-subheading);
    font-size: 11.5px; font-weight: 600;
    color: var(--text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tp-contact-share-vin {
    font-family: monospace;
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tp-contact-shared-empty {
    font-size: 11px; font-family: var(--font-subheading);
    color: var(--text-tertiary);
    text-align: center;
    padding: 8px;
    font-style: italic;
  }

  /* Add-contact form (dropdown of CX_CUSTOMERS) */
  .tp-acf-options {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
  }
  .tp-acf-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--card-border);
    transition: background 0.12s;
  }
  .tp-acf-option:last-child { border-bottom: none; }
  .tp-acf-option:hover { background: var(--accent-light); }
  .tp-acf-option .tp-contact-av { width: 28px; height: 28px; font-size: 11px; }
  .tp-acf-empty {
    padding: 14px; text-align: center;
    font-size: 11px; color: var(--text-tertiary);
    font-family: var(--font-subheading);
  }

  /* Mini calendar popover for DOB */
  .tp-cal-pop {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
    padding: 10px;
    width: 240px;
    user-select: none;
  }
  .tp-cal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
    gap: 4px;
  }
  .tp-cal-nav {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .tp-cal-nav:hover { background: var(--accent-light); color: var(--accent); }
  .tp-cal-title {
    flex: 1; text-align: center;
    font-family: var(--font-subheading);
    font-size: 12px; font-weight: 700;
    color: var(--text-primary);
  }
  .tp-cal-selects { display: flex; gap: 4px; }
  .tp-cal-select {
    font-family: var(--font-subheading);
    font-size: 11px; font-weight: 600;
    color: var(--text-primary);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 4px;
    cursor: pointer;
    outline: none;
  }
  .tp-cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .tp-cal-dow {
    font-family: var(--font-subheading);
    font-size: 9px; font-weight: 700;
    color: var(--text-tertiary);
    text-align: center;
    padding: 4px 0;
    text-transform: uppercase;
  }
  .tp-cal-day {
    aspect-ratio: 1;
    border: none;
    background: transparent;
    border-radius: 5px;
    font-family: var(--font-subheading);
    font-size: 11px;
    color: var(--text-primary);
    cursor: pointer;
    transition: background 0.12s;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .tp-cal-day:hover { background: var(--accent-light); color: var(--accent); }
  .tp-cal-day.muted { color: var(--text-tertiary); opacity: 0.45; }
  .tp-cal-day.selected {
    background: var(--accent);
    color: #fff;
  }
  .tp-cal-day.selected:hover { background: var(--accent-dark); color: #fff; }
  .tp-cal-foot {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--card-border);
  }
  .tp-cal-foot-btn {
    font-family: var(--font-subheading);
    font-size: 10px; font-weight: 600;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .tp-cal-foot-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Tables (Weave + Portfolio txn list use simple tables) */
  .cx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cx-table thead th {
    background: var(--input-bg);
    text-align: left;
    padding: 9px 14px;
    font-family: var(--font-subheading);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--card-border);
    white-space: nowrap;
  }
  .cx-table tbody td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--card-border);
    color: var(--text-primary);
    font-family: var(--font-body);
  }
  .cx-table tbody tr:last-child td { border-bottom: none; }
  .cx-table tbody tr:hover td { background: var(--input-bg); }
  .cx-mono { font-family: monospace; font-size: 11px; color: var(--text-secondary); }

  /* Transition */

  .screen { animation: fadeIn 0.2s ease; }

  /* Recharts customizations */
  .recharts-tooltip-wrapper .recharts-default-tooltip {
    border-radius: 8px !important;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ═══════════════════════════════════════════════════════════════════════════
//  LEAD PROVIDERS — invoked from Pipelines → Integrations.
//  Each provider gets a dedicated inbound endpoint of the form
//    leads.convergenceauto.com/{clientKey}/{slug}
//  Senders (Edmunds, CarGurus, etc) post ADF XML to that endpoint and the
//  submissions show up in the View modal. No filters, no field extraction —
//  routing is determined by which slug the message hit.
// ═══════════════════════════════════════════════════════════════════════════

// Normalize a free-text provider name into a slug. Lowercase, spaces → '_',
// strip anything that wouldn't be safe in a URL path segment.
const slugifyProviderName = (name) => {
  return String(name || '')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9_\s-]+/g, '')   // drop punctuation
    .replace(/[\s-]+/g, '_')          // spaces & hyphens → underscore
    .replace(/_+/g, '_')              // collapse runs
    .replace(/^_|_$/g, '');           // trim leading/trailing underscores
};

// Derive a stable-looking client key from the active dealer name.
// In a real backend this would come from an authenticated account record;
// for the demo we hash the dealer string to a short alphanumeric key.
const deriveClientKey = (dealer) => {
  const s = String(dealer || 'default');
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  const positive = Math.abs(h).toString(36).toUpperCase().padStart(6, '0').slice(0, 6);
  return `CK${positive}`;
};

// Endpoint for a given (clientKey, slug). Kept as a function so the base
// host is changeable in one place if the brand domain ever changes.
const leadProviderEndpoint = (clientKey, slug) =>
  `leads.convergenceauto.com/${clientKey}/${slug}`;

// Ensure the slug is unique within the current set of providers for this
// dealer. If a clash exists, append _2, _3, etc.
const ensureUniqueSlug = (desired, existing) => {
  const taken = new Set((existing || []).map(p => p.slug));
  if (!taken.has(desired)) return desired;
  let i = 2;
  while (taken.has(`${desired}_${i}`)) i++;
  return `${desired}_${i}`;
};

// Build a few seed submissions so newly-created demo providers don't open
// to an empty pane. Real providers in production would start empty.
const buildSeedSubmissions = (providerName) => {
  const now = Date.now();
  const samples = [
    { firstName:'Sarah',   lastName:'Johnson',  email:'sarah.j@email.com',     phone:'+15558472910', year:'2024', make:'Honda',   model:'CR-V Hybrid', interest:'new'  },
    { firstName:'Marcus',  lastName:'Chen',     email:'mchen@gmail.com',       phone:'+15553319088', year:'2022', make:'Toyota',  model:'Tacoma',      interest:'used' },
    { firstName:'Priya',   lastName:'Patel',    email:'priya.patel@me.com',    phone:'+15558810432', year:'2025', make:'Ford',    model:'F-150',       interest:'new'  },
  ];
  return samples.map((s, i) => {
    const ts = new Date(now - (i + 1) * 1000 * 60 * 60 * (4 + i * 7));
    const isoTs = ts.toISOString();
    const raw =
`<?xml version="1.0"?>
<?adf version="1.0"?>
<adf>
  <prospect>
    <id sequence="${100 + i}" source="${providerName}"/>
    <requestdate>${isoTs}</requestdate>
    <vehicle interest="${s.interest}" status="new">
      <year>${s.year}</year>
      <make>${s.make}</make>
      <model>${s.model}</model>
    </vehicle>
    <customer>
      <contact>
        <name part="first">${s.firstName}</name>
        <name part="last">${s.lastName}</name>
        <email>${s.email}</email>
        <phone type="mobile">${s.phone}</phone>
      </contact>
    </customer>
    <provider>
      <name part="full">${providerName}</name>
      <service>Lead Submission</service>
    </provider>
  </prospect>
</adf>`;
    return {
      id: now - i * 1000 - Math.floor(Math.random() * 999),
      receivedAt: ts.getTime(),
      from: `noreply@${slugifyProviderName(providerName)}.com`,
      subject: `New Lead — ${s.firstName} ${s.lastName} — ${s.year} ${s.make} ${s.model}`,
      summary: `${s.firstName} ${s.lastName} · ${s.year} ${s.make} ${s.model}`,
      raw,
    };
  });
};

const formatSubmissionTime = (ts) => {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
  }
  return d.toLocaleDateString([], { month:'short', day:'numeric', year: d.getFullYear() === now.getFullYear() ? undefined : 'numeric' });
};

// ── Add Lead Provider modal ───────────────────────────────────────────────────
const AddLeadProviderModal = ({ clientKey, existingProviders, onClose, onSave }) => {
  const [name, setName] = useState('');
  const slug = slugifyProviderName(name);
  const uniqueSlug = slug ? ensureUniqueSlug(slug, existingProviders) : '';
  const canSave = uniqueSlug.length > 0;
  const slugWasAdjusted = slug && uniqueSlug !== slug;

  const handleSave = () => {
    if (!canSave) return;
    const provider = {
      id: Date.now() + Math.random(),
      name: name.trim(),
      slug: uniqueSlug,
      clientKey,
      createdAt: Date.now(),
      submissions: buildSeedSubmissions(name.trim()),
    };
    onSave(provider);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div
        className="modal"
        onClick={e => e.stopPropagation()}
        style={{width:'min(560px, 92vw)', maxWidth:'92vw'}}>
        <div className="modal-header">
          <div>
            <div className="modal-title">Add Lead Provider</div>
            <div style={{fontSize:12, color:'var(--text-tertiary)', marginTop:3}}>
              Create a dedicated inbound endpoint for a lead source.
            </div>
          </div>
          <button className="btn btn-icon" onClick={onClose}><Icon name="close" size={14}/></button>
        </div>

        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Lead Provider Name</label>
            <input
              className="form-input"
              placeholder="e.g. Edmunds, CarGurus, AutoTrader…"
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && canSave) handleSave(); }}
              autoFocus
            />
          </div>

          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Inbound Endpoint</label>
            <div style={{
              padding:'10px 12px',
              background:'var(--input-bg)',
              border:'1px solid var(--border)',
              borderRadius:'var(--radius-sm)',
              fontFamily:'monospace',
              fontSize:13,
              color: canSave ? 'var(--text-primary)' : 'var(--text-tertiary)',
              display:'flex',
              alignItems:'center',
              minHeight:38,
              wordBreak:'break-all',
              lineHeight:1.4,
            }}>
              {canSave ? (
                <>
                  <span style={{color:'var(--text-secondary)'}}>leads.convergenceauto.com/{clientKey}/</span>
                  <span style={{color:'var(--accent)', fontWeight:600}}>{uniqueSlug}</span>
                </>
              ) : (
                <span style={{fontStyle:'italic'}}>Type a name to preview the endpoint…</span>
              )}
            </div>
            {slugWasAdjusted && (
              <div style={{fontSize:11.5, color:'var(--text-tertiary)', marginTop:6, lineHeight:1.45}}>
                A provider with the slug <strong>{slug}</strong> already exists, so this one will use <strong>{uniqueSlug}</strong>.
              </div>
            )}
            <div style={{fontSize:11.5, color:'var(--text-tertiary)', marginTop:6, lineHeight:1.45}}>
              ADF XML submissions sent to this endpoint will appear under this provider.
            </div>
          </div>
        </div>

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button
            className="btn btn-primary"
            disabled={!canSave}
            onClick={handleSave}
            style={{opacity: canSave ? 1 : 0.5, cursor: canSave ? 'pointer' : 'not-allowed'}}>
            Create Lead Provider
          </button>
        </div>
      </div>
    </div>
  );
};

// ── View / manage existing Lead Providers ─────────────────────────────────────
const ViewLeadProvidersModal = ({ providers, clientKey, onClose, onUpdate, onDelete, onAddNew }) => {
  const visibleProviders = useMemo(
    () => providers
      .filter(p => !p.clientKey || p.clientKey === clientKey)
      .slice()
      .sort((a, b) => a.name.localeCompare(b.name)),
    [providers, clientKey]
  );

  const [search, setSearch] = useState('');
  const filteredProviders = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return visibleProviders;
    return visibleProviders.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.slug || '').toLowerCase().includes(q)
    );
  }, [visibleProviders, search]);

  const [selectedId, setSelectedId] = useState(visibleProviders[0]?.id || null);
  const selected = visibleProviders.find(p => p.id === selectedId) || null;
  const [editingName, setEditingName] = useState(false);
  const [draftName, setDraftName] = useState('');
  const [selectedSubmissionId, setSelectedSubmissionId] = useState(null);
  const [copiedEndpoint, setCopiedEndpoint] = useState(false);

  // Keep selection valid as providers change
  useEffect(() => {
    if (selectedId == null && visibleProviders.length > 0) {
      setSelectedId(visibleProviders[0].id);
    }
    if (selectedId != null && !visibleProviders.find(p => p.id === selectedId)) {
      setSelectedId(visibleProviders[0]?.id || null);
    }
  }, [visibleProviders, selectedId]);

  // Reset submission selection when provider changes
  useEffect(() => {
    setSelectedSubmissionId(selected?.submissions?.[0]?.id || null);
    setEditingName(false);
    setCopiedEndpoint(false);
  }, [selectedId]); // eslint-disable-line

  const startEditName = () => { setDraftName(selected?.name || ''); setEditingName(true); };
  const commitName = () => {
    if (!selected) return;
    const trimmed = draftName.trim();
    if (!trimmed) { setEditingName(false); return; }
    const newSlug = ensureUniqueSlug(
      slugifyProviderName(trimmed),
      visibleProviders.filter(p => p.id !== selected.id)
    );
    onUpdate(selected.id, { name: trimmed, slug: newSlug });
    setEditingName(false);
  };
  const handleDelete = () => {
    if (!selected) return;
    if (window.confirm(`Delete lead provider "${selected.name}"? Existing submissions will be removed.`)) {
      onDelete(selected.id);
    }
  };

  const endpoint = selected
    ? leadProviderEndpoint(selected.clientKey || clientKey, selected.slug || slugifyProviderName(selected.name))
    : '';

  const copyEndpoint = async () => {
    if (!endpoint) return;
    try {
      await navigator.clipboard.writeText(endpoint);
      setCopiedEndpoint(true);
      setTimeout(() => setCopiedEndpoint(false), 1500);
    } catch (_) {
      // Fallback: select the text node so user can copy manually
      setCopiedEndpoint(false);
    }
  };

  const submissions = selected?.submissions || [];
  const selectedSubmission = submissions.find(s => s.id === selectedSubmissionId) || submissions[0] || null;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div
        className="modal"
        onClick={e => e.stopPropagation()}
        style={{
          width:'min(1180px, 92vw)',
          maxWidth:'92vw',
          height:'min(820px, 88vh)',
          display:'flex',
          flexDirection:'column',
        }}>
        <div className="modal-header" style={{flexShrink:0}}>
          <div>
            <div className="modal-title">Lead Providers</div>
            <div style={{fontSize:12, color:'var(--text-tertiary)', marginTop:3}}>
              {visibleProviders.length === 0
                ? 'No providers yet'
                : `${visibleProviders.length} provider${visibleProviders.length === 1 ? '' : 's'} routing to ${clientKey}`}
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center'}}>
            <button className="btn btn-primary" style={{padding:'6px 12px', fontSize:12.5}} onClick={onAddNew}>
              <Icon name="plus" size={12}/> Add New
            </button>
            <button className="btn btn-icon" onClick={onClose}><Icon name="close" size={14}/></button>
          </div>
        </div>

        <div className="modal-body" style={{padding:0, display:'grid', gridTemplateColumns:'280px 1fr', flex:1, minHeight:0}}>
          {/* ── Sidebar: providers list ── */}
          <div style={{borderRight:'1px solid var(--border)', overflowY:'auto', background:'var(--input-bg)', display:'flex', flexDirection:'column'}}>
            {/* Search input */}
            <div style={{padding:'10px 12px', borderBottom:'1px solid var(--border)', flexShrink:0, position:'sticky', top:0, background:'var(--input-bg)', zIndex:1}}>
              <div style={{position:'relative'}}>
                <Icon name="search" size={13} style={{position:'absolute', left:9, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)', pointerEvents:'none'}}/>
                <input
                  className="form-input"
                  placeholder="Search providers…"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  style={{paddingLeft:28, fontSize:12.5, padding:'6px 10px 6px 28px'}}
                />
              </div>
            </div>

            {visibleProviders.length === 0 && (
              <div style={{padding:24, fontSize:13, color:'var(--text-tertiary)', textAlign:'center'}}>
                No lead providers yet. Click <strong>Add New</strong> to spin one up.
              </div>
            )}
            {visibleProviders.length > 0 && filteredProviders.length === 0 && (
              <div style={{padding:20, fontSize:12.5, color:'var(--text-tertiary)', textAlign:'center'}}>
                No providers match <strong>"{search}"</strong>.
              </div>
            )}
            {filteredProviders.map(p => {
              const active = selectedId === p.id;
              const subCount = (p.submissions || []).length;
              return (
                <div key={p.id}
                  onClick={() => setSelectedId(p.id)}
                  style={{
                    padding:'12px 14px',
                    borderBottom:'1px solid var(--border)',
                    cursor:'pointer',
                    background: active ? 'var(--accent-light)' : 'transparent',
                    borderLeft: active ? '3px solid var(--accent)' : '3px solid transparent',
                  }}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span style={{fontSize:14}}>📥</span>
                    <div style={{flex:1, overflow:'hidden'}}>
                      <div style={{fontSize:13, fontWeight:600, color: active ? 'var(--accent)' : 'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.name}</div>
                      <div style={{fontSize:11, color:'var(--text-tertiary)', marginTop:2, fontFamily:'monospace', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={p.slug}>
                        /{p.slug || slugifyProviderName(p.name)}
                      </div>
                      <div style={{fontSize:11, color:'var(--text-tertiary)', marginTop:2}}>
                        {subCount} submission{subCount === 1 ? '' : 's'}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Main pane: endpoint header + submissions ── */}
          <div style={{display:'flex', flexDirection:'column', minHeight:0}}>
            {!selected && (
              <div style={{padding:'40px 20px', fontSize:13, color:'var(--text-tertiary)', textAlign:'center'}}>
                {visibleProviders.length === 0
                  ? 'Add a lead provider to get started.'
                  : 'Select a provider from the list to view its submissions.'}
              </div>
            )}
            {selected && (
              <>
                {/* Provider header */}
                <div style={{padding:'var(--space-lg)', borderBottom:'1px solid var(--border)', flexShrink:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, flexWrap:'wrap'}}>
                    {editingName ? (
                      <>
                        <input
                          className="form-input"
                          autoFocus
                          value={draftName}
                          onChange={e => setDraftName(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') commitName(); if (e.key === 'Escape') setEditingName(false); }}
                          style={{fontSize:16, fontWeight:600, padding:'5px 10px', maxWidth:380}}
                        />
                        <button className="btn btn-primary" style={{padding:'5px 12px', fontSize:12}} onClick={commitName}>Save</button>
                        <button className="btn btn-ghost" style={{padding:'5px 12px', fontSize:12}} onClick={() => setEditingName(false)}>Cancel</button>
                      </>
                    ) : (
                      <>
                        <div style={{fontFamily:'var(--font-display)', fontSize:19, fontWeight:600}}>{selected.name}</div>
                        <button className="btn btn-ghost" style={{padding:'4px 8px', fontSize:11.5}} onClick={startEditName}>
                          <Icon name="edit" size={11}/> Rename
                        </button>
                        <div style={{flex:1}}/>
                        <button className="btn btn-ghost" style={{padding:'4px 8px', fontSize:11.5, color:'#ef4444', borderColor:'rgba(239,68,68,0.35)'}} onClick={handleDelete}>
                          <Icon name="trash" size={11}/> Delete
                        </button>
                      </>
                    )}
                  </div>

                  {/* Endpoint chip with copy */}
                  <div style={{
                    display:'flex',
                    alignItems:'center',
                    gap:10,
                    padding:'8px 12px',
                    background:'var(--input-bg)',
                    border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)',
                  }}>
                    <span style={{fontSize:10.5, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-tertiary)', flexShrink:0}}>
                      Endpoint
                    </span>
                    <span style={{fontFamily:'monospace', fontSize:12.5, color:'var(--text-primary)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={endpoint}>
                      {endpoint}
                    </span>
                    <button
                      className="btn btn-ghost"
                      style={{padding:'4px 10px', fontSize:11.5, flexShrink:0}}
                      onClick={copyEndpoint}>
                      {copiedEndpoint ? <><Icon name="check" size={11}/> Copied</> : <><Icon name="copy" size={11}/> Copy</>}
                    </button>
                  </div>
                </div>

                {/* Submissions area: list on left, detail on right */}
                <div style={{flex:1, minHeight:0, display:'grid', gridTemplateColumns:'minmax(0, 280px) minmax(0, 1fr)'}}>
                  {/* Submissions list */}
                  <div style={{borderRight:'1px solid var(--border)', overflowY:'auto', background:'var(--card-bg)'}}>
                    <div style={{padding:'10px 14px', borderBottom:'1px solid var(--border)', background:'var(--input-bg)', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-tertiary)', position:'sticky', top:0}}>
                      Submissions ({submissions.length})
                    </div>
                    {submissions.length === 0 && (
                      <div style={{padding:'24px 16px', fontSize:12.5, color:'var(--text-tertiary)', textAlign:'center', lineHeight:1.5}}>
                        Waiting for the first submission to this endpoint…
                      </div>
                    )}
                    {submissions
                      .slice()
                      .sort((a, b) => b.receivedAt - a.receivedAt)
                      .map(sub => {
                        const active = (selectedSubmission?.id === sub.id);
                        return (
                          <div key={sub.id}
                            onClick={() => setSelectedSubmissionId(sub.id)}
                            style={{
                              padding:'10px 14px',
                              borderBottom:'1px solid var(--border)',
                              cursor:'pointer',
                              background: active ? 'var(--accent-light)' : 'transparent',
                              borderLeft: active ? '3px solid var(--accent)' : '3px solid transparent',
                            }}>
                            <div style={{fontSize:12.5, fontWeight:600, color: active ? 'var(--accent)' : 'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                              {sub.summary || sub.subject || 'Lead submission'}
                            </div>
                            <div style={{fontSize:11, color:'var(--text-tertiary)', marginTop:3, display:'flex', justifyContent:'space-between', gap:8}}>
                              <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{sub.from}</span>
                              <span style={{flexShrink:0}}>{formatSubmissionTime(sub.receivedAt)}</span>
                            </div>
                          </div>
                        );
                      })
                    }
                  </div>

                  {/* Submission detail */}
                  <div style={{overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0}}>
                    <SubmissionDetailPane
                      submission={selectedSubmission}
                      providerEndpoint={endpoint}
                    />
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── PIPELINES SCREEN ────────────────────────────────────────────────────────
const PipelinesScreen = ({ navigate, enabledIntegrations = [], onEnableIntegration, leadProviders = [], onAddLeadProvider, onUpdateLeadProvider, onDeleteLeadProvider, dealer }) => {
  const [appointments, setAppointments] = useState(CX_APPOINTMENTS_INIT);
  const [uploadedFile, setUploadedFile] = useState(null);
  const [tab, setTab] = useState('files'); // 'files' | 'integrations'
  const [showAddLeadProvider, setShowAddLeadProvider] = useState(false);
  const [showViewLeadProviders, setShowViewLeadProviders] = useState(false);
  const fileRef = useRef(null);

  // Client key derived from the active dealer. Used to build the inbound
  // endpoint for each lead provider (leads.convergenceauto.com/{ck}/{slug}).
  const clientKey = useMemo(() => deriveClientKey(dealer), [dealer]);

  // Providers belonging to this dealer (filter by clientKey, but allow legacy
  // providers without a clientKey field to still appear).
  const dealerProviders = useMemo(
    () => leadProviders.filter(p => !p.clientKey || p.clientKey === clientKey),
    [leadProviders, clientKey]
  );

  const onFileChange = (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) setUploadedFile(f.name);
  };
  const deleteApt = (id) => setAppointments(prev => prev.filter(a => a.id !== id));

  const isEnabled = (id) => enabledIntegrations.includes(id);
  const handleIntegrationClick = (intg) => {
    if (intg.comingSoon) return;
    // Lead Providers tile opens its own manager UI inside Pipelines — do not
    // navigate to Data Sources because lead providers aren't a db source.
    if (intg.isLeadProviders) {
      if (!isEnabled(intg.id)) onEnableIntegration && onEnableIntegration(intg.id);
      setShowViewLeadProviders(true);
      return;
    }
    if (!isEnabled(intg.id)) onEnableIntegration && onEnableIntegration(intg.id);
    // Navigate to Data Sources with this integration's table selected
    if (intg.dbDef) navigate && navigate('datasources', { dbId: intg.dbDef.id });
  };

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="topbar"><div className="topbar-title" style={{marginLeft:48}}>Pipelines</div></div>

      {/* Tab strip — Files vs Integrations */}
      <div style={{
        display:'flex',
        padding:'0 28px',
        background:'var(--card-bg)',
        borderBottom:'1px solid var(--border)',
        gap: 4,
        flexShrink:0,
      }}>
        {[
          {id:'files',        label:'Files',        count: appointments.length},
          {id:'integrations', label:'Integrations', count: enabledIntegrations.length || null},
        ].map(t => (
          <button key={t.id}
            onClick={() => setTab(t.id)}
            className="btn"
            style={{
              background:'transparent', border:'none',
              borderBottom: tab===t.id ? '2px solid var(--accent)' : '2px solid transparent',
              borderRadius: 0, padding:'12px 14px',
              color: tab===t.id ? 'var(--accent)' : 'var(--text-secondary)',
              fontWeight: tab===t.id ? 600 : 500, fontSize:'13px', gap:6,
            }}>
            {t.label}
            {t.count != null && <span className={`count-badge${tab===t.id?' accent':''}`}>{t.count}</span>}
          </button>
        ))}
      </div>

      {tab === 'files' && (
        <div className="cx-screen">
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:4}}>
            <div className="cx-h1" style={{marginBottom:0}}>Pipelines</div>
            <span className="cx-chip success">{appointments.length} {appointments.length === 1 ? 'File' : 'Files'}</span>
          </div>
          <div className="cx-sub">Securely upload campaign lists</div>

          <div className="cx-upload-row">
            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls,.txt" style={{display:'none'}} onChange={onFileChange}/>
            <button className="cx-btn-primary" onClick={() => fileRef.current && fileRef.current.click()}>
              <Icon name="upload" size={14}/> Upload File
            </button>
            {uploadedFile && <span style={{fontSize:12,color:'var(--text-secondary)'}}>{uploadedFile}</span>}
          </div>

          <div className="cx-card">
            {appointments.map((a) => (
              <div key={a.id} className={`cx-list-item ${a.status === 'upcoming' ? 'upcoming' : 'completed'}`}>
                <div className={`cx-list-icon ${a.status === 'upcoming' ? 'purple' : 'green'}`}>
                  <Icon name="calendarCheck" size={18}/>
                </div>
                <div className="cx-list-content">
                  <div className="cx-list-title">
                    {a.type}
                    <span className={`cx-chip ${a.status === 'upcoming' ? 'primary' : 'success'}`} style={{marginLeft:8}}>{a.status}</span>
                  </div>
                  <div className="cx-list-sub">{a.date} at {a.time} · {a.rep}</div>
                  <div className="cx-list-sub-faint">{a.notes}</div>
                </div>
                <button className="cx-del-btn" onClick={() => deleteApt(a.id)} title="Delete file">
                  <Icon name="trash" size={14}/>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === 'integrations' && (
        <div className="cx-screen">
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:4}}>
            <div className="cx-h1" style={{marginBottom:0}}>Integrations</div>
            <span className="cx-chip success">{enabledIntegrations.length} Connected</span>
          </div>
          <div className="cx-sub">Connect external systems to pipe data straight into the Convergence Portal</div>

          <div style={{
            display:'grid',
            gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))',
            gap:16, marginTop:18,
          }}>
            {INTEGRATIONS_CATALOG.map(intg => {
              const enabled = isEnabled(intg.id);
              const disabled = intg.comingSoon;
              return (
                <div key={intg.id}
                  onClick={() => handleIntegrationClick(intg)}
                  style={{
                    background:'var(--card-bg)', border:'1px solid var(--border)', borderRadius:'var(--radius-md)',
                    padding:0, overflow:'hidden', cursor: disabled ? 'default' : 'pointer',
                    transition:'transform 0.15s, box-shadow 0.15s, border-color 0.15s',
                    display:'flex', flexDirection:'column', position:'relative',
                    opacity: disabled ? 0.62 : 1,
                  }}
                  onMouseEnter={(e) => { if (!disabled) { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 6px 24px rgba(15,15,25,0.08)'; e.currentTarget.style.borderColor=intg.color+'55'; }}}
                  onMouseLeave={(e) => { e.currentTarget.style.transform='translateY(0)'; e.currentTarget.style.boxShadow='none'; e.currentTarget.style.borderColor='var(--border)'; }}
                >
                  {/* Icon banner */}
                  <div style={{
                    height:104,
                    background:`linear-gradient(135deg, ${intg.color}22 0%, ${intg.color}08 100%)`,
                    borderBottom:`1px solid ${intg.color}25`,
                    display:'flex', alignItems:'center', justifyContent:'flex-start',
                    padding:'0 20px',
                    position:'relative',
                  }}>
                    <div style={{
                      width:56, height:56, borderRadius:14,
                      background:'#fff',
                      border:`1px solid ${intg.color}30`,
                      boxShadow:`0 4px 12px ${intg.color}1f`,
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:30, lineHeight:1,
                    }}>{intg.icon}</div>
                    {enabled && (
                      <span className="cx-chip success" style={{position:'absolute', top:12, right:12}}>
                        <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#3db832'}}/>
                        Connected
                      </span>
                    )}
                    {disabled && (
                      <span className="cx-chip default" style={{position:'absolute', top:12, right:12}}>
                        Coming soon
                      </span>
                    )}
                  </div>

                  {/* Meta */}
                  <div style={{padding:'14px 18px 16px', display:'flex', flexDirection:'column', gap:6, flex:1}}>
                    <div style={{fontFamily:'var(--font-display)', fontSize:'15px', fontWeight:600, color:'var(--text-primary)'}}>{intg.name}</div>
                    <div style={{fontSize:'12.5px', color:'var(--text-secondary)', lineHeight:1.45, flex:1}}>{intg.desc}</div>

                    {intg.isLeadProviders ? (
                      <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',marginTop:10,gap:6}}>
                        <button
                          onClick={(e) => { e.stopPropagation(); if (!isEnabled(intg.id)) onEnableIntegration && onEnableIntegration(intg.id); setShowViewLeadProviders(true); }}
                          style={{
                            background:'transparent', color:intg.color, border:`1px solid ${intg.color}55`,
                            borderRadius:8, padding:'6px 10px', fontSize:11.5, fontWeight:600, cursor:'pointer',
                            display:'inline-flex', alignItems:'center', gap:4, whiteSpace:'nowrap',
                          }}>
                          View Lead Providers
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); if (!isEnabled(intg.id)) onEnableIntegration && onEnableIntegration(intg.id); setShowAddLeadProvider(true); }}
                          className="cx-btn-primary"
                          style={{padding:'6px 10px', fontSize:11.5, whiteSpace:'nowrap'}}>
                          <Icon name="plus" size={11}/> Add New
                        </button>
                      </div>
                    ) : (
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10}}>
                        <span style={{fontSize:'11px',color:'var(--text-tertiary)',fontFamily:'monospace'}}>
                          {enabled ? 'Active' : disabled ? '—' : 'One-click connect'}
                        </span>
                        {!disabled && (
                          <button
                            onClick={(e) => { e.stopPropagation(); handleIntegrationClick(intg); }}
                            className={enabled ? '' : 'cx-btn-primary'}
                            style={enabled ? {
                              background:'transparent', color:intg.color, border:`1px solid ${intg.color}55`,
                              borderRadius:8, padding:'6px 12px', fontSize:12, fontWeight:600, cursor:'pointer',
                              display:'inline-flex', alignItems:'center', gap:4,
                            } : { padding:'6px 12px', fontSize:12 }}
                          >
                            {enabled ? <>View data <Icon name="chevronRight" size={11}/></> : <>Connect</>}
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Lead Providers modals ── */}
      {showAddLeadProvider && (
        <AddLeadProviderModal
          clientKey={clientKey}
          existingProviders={dealerProviders}
          onClose={() => setShowAddLeadProvider(false)}
          onSave={(provider) => { onAddLeadProvider && onAddLeadProvider(provider); setShowAddLeadProvider(false); }}
        />
      )}
      {showViewLeadProviders && (
        <ViewLeadProvidersModal
          providers={leadProviders}
          clientKey={clientKey}
          onClose={() => setShowViewLeadProviders(false)}
          onUpdate={onUpdateLeadProvider}
          onDelete={onDeleteLeadProvider}
          onAddNew={() => { setShowViewLeadProviders(false); setShowAddLeadProvider(true); }}
        />
      )}
    </div>
  );
};

        <div className="cx-h1">Portfolio</div>

// Format dates as MM/DD/YYYY regardless of input format
const fmtVehicleDate = (s) => {
  if (!s) return null;
  if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(s.trim())) return s.trim();
  const d = new Date(s);
  if (isNaN(d.getTime())) return s;
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${mm}/${dd}/${yyyy}`;
};

// ─── MINI DATE PICKER (for DOB editing) ──────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_SHORT   = ['S','M','T','W','T','F','S'];

const MiniDatePicker = ({ value, onSelect, onClose }) => {
  // value is YYYY-MM-DD or ''. Default view: that month, else today.
  const today = new Date();
  let initY, initM;
  if (value) {
    const [y, m] = value.split('-').map(Number);
    initY = y; initM = (m || 1) - 1;
  } else {
    initY = today.getFullYear(); initM = today.getMonth();
  }
  const [viewY, setViewY] = useState(initY);
  const [viewM, setViewM] = useState(initM);
  const popRef = React.useRef(null);

  // Close on outside click
  React.useEffect(() => {
    const handler = (e) => {
      if (popRef.current && !popRef.current.contains(e.target)) onClose && onClose();
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);

  const prevMonth = () => {
    if (viewM === 0) { setViewM(11); setViewY(viewY - 1); }
    else setViewM(viewM - 1);
  };
  const nextMonth = () => {
    if (viewM === 11) { setViewM(0); setViewY(viewY + 1); }
    else setViewM(viewM + 1);
  };

  // Build grid for the view month
  const firstDayDow = new Date(viewY, viewM, 1).getDay();
  const daysInMonth = new Date(viewY, viewM + 1, 0).getDate();
  const daysInPrev  = new Date(viewY, viewM,     0).getDate();

  const cells = [];
  for (let i = firstDayDow - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, muted: true, y: viewM === 0 ? viewY - 1 : viewY, m: viewM === 0 ? 11 : viewM - 1 });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, muted: false, y: viewY, m: viewM });
  }
  while (cells.length % 7 !== 0 || cells.length < 42) {
    const last = cells[cells.length - 1];
    if (cells.length >= 42) break;
    const nextDay = last.muted && last.m === viewM ? last.day + 1 : (cells[cells.length - 1].muted ? 1 : cells.length - firstDayDow - daysInMonth + 1);
    cells.push({ day: nextDay, muted: true, y: viewM === 11 ? viewY + 1 : viewY, m: viewM === 11 ? 0 : viewM + 1 });
  }

  const selectedIso = value || null;

  const pick = (cell) => {
    const iso = `${cell.y}-${String(cell.m + 1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
    onSelect && onSelect(iso);
  };

  const now = new Date();
  const yearOptions = [];
  for (let y = now.getFullYear(); y >= 1925; y--) yearOptions.push(y);

  return (
    <div className="tp-cal-pop" ref={popRef} onClick={e => e.stopPropagation()}>
      <div className="tp-cal-head">
        <button className="tp-cal-nav" onClick={prevMonth} title="Previous month">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M10 4l-4 4 4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div className="tp-cal-selects">
          <select className="tp-cal-select" value={viewM} onChange={e => setViewM(parseInt(e.target.value, 10))}>
            {MONTH_NAMES.map((mn, i) => <option key={i} value={i}>{mn}</option>)}
          </select>
          <select className="tp-cal-select" value={viewY} onChange={e => setViewY(parseInt(e.target.value, 10))}>
            {yearOptions.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <button className="tp-cal-nav" onClick={nextMonth} title="Next month">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
      <div className="tp-cal-grid">
        {DOW_SHORT.map((d, i) => <div key={'dow'+i} className="tp-cal-dow">{d}</div>)}
        {cells.slice(0, 42).map((cell, i) => {
          const iso = `${cell.y}-${String(cell.m + 1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
          const isSelected = selectedIso === iso;
          return (
            <button key={i}
              className={`tp-cal-day ${cell.muted ? 'muted' : ''} ${isSelected ? 'selected' : ''}`}
              onClick={() => pick(cell)}
            >{cell.day}</button>
          );
        })}
      </div>
      <div className="tp-cal-foot">
        <button className="tp-cal-foot-btn" onClick={() => onSelect && onSelect('')}>Clear</button>
        <button className="tp-cal-foot-btn" onClick={onClose}>Close</button>
      </div>
    </div>
  );
};
