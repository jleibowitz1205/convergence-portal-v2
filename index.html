    const POP_H = 300, POP_W = 240;
    const vh = window.innerHeight, vw = window.innerWidth;
    let top;
    if (rect.top >= POP_H + 8)            top = rect.top - POP_H - 4;     // above
    else if (vh - rect.bottom >= POP_H+8) top = rect.bottom + 4;          // below
    else                                   top = Math.max(8, vh - POP_H - 8);
    let left = rect.right - POP_W;
    if (left < 8) left = 8;
    if (left + POP_W > vw - 8) left = vw - POP_W - 8;
    setDobAnchor({ top, left });
    setEditing({ contactId: otherId, field: 'dob' });
  };
  const closeDobPicker = () => { setDobAnchor(null); setEditing({ contactId:null, field:null }); };

  const q = (search || '').trim().toLowerCase();
  const filteredCustomers = !q ? customers : customers.filter(c =>
    c.name.toLowerCase().includes(q) || c.phone.replace(/\D/g,'').includes(q.replace(/\D/g,'')) || c.phone.includes(q)
  );
  const selectedCustomer = customers.find(c => c.id === selectedId) || null;
  const selectedTimeline = selectedCustomer ? selectedCustomer.timeline : [];
  // Timeline shown in the middle column — respects the type filter chips.
  // Right-column counts/sums continue to use selectedTimeline so the totals
  // reflect the full contact activity regardless of which chips are active.
  const displayedTimeline = selectedTimeline.filter(e => typeFilter[e.type] !== false);

  const countFor = (t) => selectedTimeline.filter(e => e.type === t).length;
  const groupCount = (types) => selectedTimeline.filter(e => types.indexOf(e.type) !== -1).length;
  const sumAmount = (types) => {
    let total = 0;
    selectedTimeline.forEach(e => {
      if (types.indexOf(e.type) === -1) return;
      const m = (e.title || '').match(/\$([0-9,]+(?:\.[0-9]+)?)/);
      if (m) total += parseFloat(m[1].replace(/,/g,'')) || 0;
    });
    return total ? '$' + total.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '$0.00';
  };
  const amtFor = (t) => sumAmount([t]);

  const tagChipClass = (color) => {
    const m = { success:'success', primary:'primary', secondary:'secondary', warning:'warning', error:'error', default:'default' };
    return 'cx-chip ' + (m[color] || 'default');
  };

  // ── New contact helpers ─────────────────────────────────────────────
  // Compare phones by digits only so formatting variations don't cause false misses.
  const normalizePhone = (p) => (p || '').replace(/\D/g, '');
  const lookupCustomerByPhone = (phone) => {
    const digits = normalizePhone(phone);
    if (!digits || digits.length < 7) return null;
    return customers.find(c => {
      const d = normalizePhone(c.phone);
      // Match if last 10 digits match (handles +1 vs 1 vs nothing).
      return d.slice(-10) === digits.slice(-10);
    }) || null;
  };

  // Create a new contact and return its id. `vehicles` is an array of
  // { vin, year, make, model } objects entered in the modal.
  const createContact = ({ firstName, lastName, phone, email, dob, address, city, state, postalCode, vehicles }) => {
    const newId = (customers.reduce((mx, c) => Math.max(mx, c.id), 0) || 0) + 1;
    const fullName = `${firstName.trim()} ${lastName.trim()}`.trim();
    const initials = (firstName.trim()[0] || '').toUpperCase() + (lastName.trim()[0] || '').toUpperCase();
    const newCustomer = {
      id: newId,
      name: fullName,
      initials: initials || '?',
      phone: phone.trim(),
      address: (address || '').trim(),
      city: (city || '').trim(),
      state: (state || '').trim(),
      postalCode: (postalCode || '').trim(),
      tags: [{label:'New', color:'primary'}],
      timeline: [],
    };
    setCustomers(prev => [...prev, newCustomer]);
    setContactPropsMap(prev => ({
      ...prev,
      [newId]: { email: (email || '').trim(), dob: (dob || '').trim() }
    }));
    // Add vehicles for the new contact
    const cleaned = (vehicles || [])
      .filter(v => (v.year || '').trim() && (v.make || '').trim() && (v.model || '').trim())
      .map((v, i) => ({
        id: `v${newId}-${i+1}`,
        vin: (v.vin || '').trim(),
        year: v.year.trim(),
        make: v.make.trim(),
        model: v.model.trim(),
        purchaseDate: null,
        lastServiceDate: null,
        tradeDate: null,
        owned: true,
      }));
    if (cleaned.length) {
      setVehiclesMap(prev => ({ ...prev, [newId]: cleaned }));
    }
    return newId;
  };

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="topbar"><div className="topbar-title" style={{marginLeft:48}}>TouchPoints</div></div>
      <div className="tp-shell">

        {/* LEFT 25% - Customer list */}
        <div className="tp-left">
          <div className="tp-search">
            <input
              type="text"
              placeholder="Search Customers"
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <button
              className="tp-search-add-btn"
              title="Add new contact"
              onClick={() => setShowNewContact(true)}
            >
              <Icon name="plus" size={14}/>
            </button>
          </div>
          <div className="tp-customer-list">
            {filteredCustomers.map(c => (
              <div
                key={c.id}
                className={`tp-customer-item ${selectedId === c.id ? 'active' : ''}`}
                onClick={() => setSelectedId(c.id)}
              >
                <div className="tp-customer-av">{c.initials}</div>
                <div style={{minWidth:0}}>
                  <div className="tp-customer-name">{c.name}</div>
                  <div className="tp-customer-phone">{c.phone}</div>
                </div>
              </div>
            ))}
            {filteredCustomers.length === 0 && (
              <div style={{textAlign:'center', padding:'40px 16px', opacity:0.35}}>
                <div style={{fontSize:12,fontFamily:'var(--font-subheading)'}}>No customers found</div>
              </div>
            )}
          </div>
        </div>

        {/* MIDDLE 50% - Timeline */}
        <div className="tp-middle">
          {selectedCustomer && (() => {
            const activeCount = TP_FILTER_TYPES.filter(t => typeFilter[t]).length;
            const totalTypes  = TP_FILTER_TYPES.length;
            const allOn  = activeCount === totalTypes;
            const allOff = activeCount === 0;
            return (
              <div className="tp-filter-bar" ref={filterPanelRef}>
                <div className="tp-filter-summary">
                  <span className="tp-filter-summary-dot" style={{background: allOff ? 'var(--text-tertiary)' : 'var(--accent)'}}/>
                  <span>
                    Showing <span className="tp-filter-summary-count">{displayedTimeline.length}</span> of{' '}
                    <span className="tp-filter-summary-count">{selectedTimeline.length}</span> touchpoints
                  </span>
                </div>
                <button
                  className={`tp-filter-trigger${!allOn ? ' is-active' : ''}`}
                  onClick={() => setFilterPanelOpen(o => !o)}
                  title="Filter touchpoint types"
                >
                  <Icon name="filter" size={12}/>
                  <span>{allOn ? 'Filter' : 'Filtered'}</span>
                  {!allOn && (
                    <span className="tp-filter-trigger-badge">{activeCount}/{totalTypes}</span>
                  )}
                </button>

                {filterPanelOpen && (
                  <div className="tp-filter-panel">
                    <div className="tp-filter-panel-head">
                      <span className="tp-filter-panel-title">Touchpoint Types</span>
                      <div className="tp-filter-panel-actions">
                        <button className="tp-filter-panel-action" onClick={() => setAllFilters(true)}>All</button>
                        <button className="tp-filter-panel-action" onClick={() => setAllFilters(false)}>None</button>
                      </div>
                    </div>
                    {TP_FILTER_GROUPS.map(group => (
                      <div className="tp-filter-panel-group" key={group.label}>
                        <div className="tp-filter-panel-group-label">{group.label}</div>
                        {group.types.map(t => {
                          const tm = TP_TYPE[t];
                          const on = !!typeFilter[t];
                          const count = countFor(t);
                          // Use the type's own brand color via CSS custom properties.
                          const styleVars = { '--type-color': tm.color, '--type-bg': tm.bg };
                          const label = t === 'appointment' ? 'Sales Appointment' : tm.label;
                          return (
                            <div
                              key={t}
                              className={`tp-filter-option${on ? '' : ' is-off'}`}
                              style={styleVars}
                              onClick={() => toggleTypeFilter(t)}
                            >
                              <div className="tp-filter-option-bar"/>
                              <div className="tp-filter-option-icon">
                                <Icon name={tm.icon} size={13}/>
                              </div>
                              <div className="tp-filter-option-text">
                                <div className="tp-filter-option-label">{label}</div>
                                <div className="tp-filter-option-count">{count} {count === 1 ? 'event' : 'events'}</div>
                              </div>
                              <span className="tp-filter-option-check">
                                {on && (
                                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                                    <path d="M2.5 6.2l2.4 2.3L9.5 3.7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                  </svg>
                                )}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}
          <div className="tp-timeline">
            {displayedTimeline.length ? displayedTimeline.map((evt, idx) => {
              const tm = TP_TYPE[evt.type] || TP_TYPE['appointment'];
              return (
                <div key={evt.id} className="tp-event">
                  <div className="tp-spine">
                    <div className="tp-spine-bubble" style={{background:tm.bg}}>
                      <span style={{color:tm.color}}><Icon name={tm.icon} size={17}/></span>
                    </div>
                    {idx < displayedTimeline.length - 1 && <div className="tp-spine-line"></div>}
                  </div>
                  <div className="tp-event-card">
                    <div className="tp-event-meta">
                      <span className="tp-event-type" style={{color:tm.color}}>{tm.label}</span>
                      <span style={{fontSize:10,opacity:0.35}}>·</span>
                      <span className="tp-event-date">{evt.date}</span>
                      {evt.time && <span className="tp-event-date" style={{opacity:0.7}}>{evt.time}</span>}
                    </div>
                    <div className="tp-event-box">
                      <div className="tp-event-title">{evt.title}</div>
                      {evt.subtitle && <div className="tp-event-sub">{evt.subtitle}</div>}
                      {evt.meta && (
                        <div className="tp-event-chips">
                          {evt.meta.map(m => (
                            <span key={m.label} className={tagChipClass(m.color)}>{m.label}</span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            }) : (
              <div style={{textAlign:'center', padding:'80px 24px', opacity:0.35}}>
                <div style={{fontSize:13, fontFamily:'var(--font-subheading)'}}>
                  {selectedTimeline.length === 0
                    ? 'No touchpoints recorded'
                    : 'No touchpoints match the selected filters'}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* RIGHT 25% - Activity summary */}
        <div className="tp-right">
          <div className="tp-summary-pad">
            <div className="tp-summary-label">Activity Summary</div>
          </div>
          <div className="tp-summary-scroll">
            {/* Contact Info card (Vehicles already have their own card below) */}
            {selectedCustomer && (() => {
              const props = getContactProps(selectedCustomer.id);
              const dobDisplay = props.dob ? (() => {
                const [y, m, d] = props.dob.split('-').map(Number);
                if (!y || !m || !d) return props.dob;
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return `${months[m-1]} ${String(d).padStart(2,'0')}, ${y}`;
              })() : '';
              return (
                <div className="tp-contact-summary">
                  <div className="tp-contact-summary-head">
                    <div className="tp-contact-summary-av">{selectedCustomer.initials}</div>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                        <div className="tp-contact-summary-name">{selectedCustomer.name}</div>
                        {/* SMS status badge + popover */}
                        {(() => {
                          const status   = getSmsStatus(selectedCustomer.id);
                          const isOpen   = smsPopover === selectedCustomer.id;
                          const label    = status === 'opted-in' ? 'Opted-In' : status === 'opted-out' ? 'Opted-Out' : 'Unconfirmed';
                          const opts = [
                            { value:'opted-in',  label:'Opt-In',  sub:'Contact has consented to SMS', dot:'#16a34a' },
                            { value:'opted-out', label:'Opt-Out', sub:'Contact has declined SMS',      dot:'#dc2626' },
                          ];
                          return (
                            <div className="sms-status-wrap" ref={smsPopoverRef}>
                              <button
                                className={`sms-status-btn ${status}`}
                                title="Change SMS consent status"
                                onClick={e => { e.stopPropagation(); setSmsPopover(isOpen ? null : selectedCustomer.id); }}
                              >
                                <span className="sms-status-dot"/>
                                <span>{label}</span>
                                <Icon name="chevronDown" size={10}/>
                              </button>
                              {isOpen && (
                                <div className="sms-popover" onClick={e => e.stopPropagation()}>
                                  <div className="sms-popover-head">SMS Consent</div>
                                  {opts.map(o => {
                                    const current = status === o.value;
                                    return (
                                      <div
                                        key={o.value}
                                        className={`sms-popover-opt${current ? ' is-current' : ''}`}
                                        onClick={() => setSmsStatus(selectedCustomer.id, o.value)}
                                      >
                                        <span className="sms-popover-opt-dot" style={{background: o.dot}}/>
                                        <div style={{flex:1, minWidth:0}}>
                                          <div className="sms-popover-opt-label">{o.label}</div>
                                          <div className="sms-popover-opt-sub">{o.sub}</div>
                                        </div>
                                        <span className="sms-popover-opt-check">
                                          {current && (
                                            <svg width="9" height="9" viewBox="0 0 12 12" fill="none">
                                              <path d="M2.5 6.2l2.4 2.3L9.5 3.7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                                            </svg>
                                          )}
                                        </span>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </div>
                          );
                        })()}
                      </div>
                      <div className="tp-contact-summary-phone">{selectedCustomer.phone}</div>
                    </div>
                  </div>
                  {/* Tabs: Contact Info / Social Channels */}
                  <div className="tp-contact-tabs">
                    <button
                      className={`tp-contact-tab${contactTab === 'info' ? ' is-active' : ''}`}
                      onClick={() => setContactTab('info')}
                    >
                      <Icon name="userOutline" size={11}/>
                      <span>Contact Info</span>
                    </button>
                    <button
                      className={`tp-contact-tab${contactTab === 'social' ? ' is-active' : ''}`}
                      onClick={() => setContactTab('social')}
                    >
                      <Icon name="link" size={11}/>
                      <span>Social Channels</span>
                    </button>
                  </div>
                  {contactTab === 'info' && (
                  <div className="tp-contact-summary-rows">
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">Email</span>
                      <span className={`tp-contact-summary-row-val${props.email ? '' : ' empty'}`}>
                        {props.email || 'Not on file'}
                      </span>
                    </div>
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">DOB</span>
                      <span className={`tp-contact-summary-row-val${dobDisplay ? '' : ' empty'}`}>
                        {dobDisplay || 'Not on file'}
                      </span>
                    </div>
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">Address</span>
                      <span className={`tp-contact-summary-row-val${selectedCustomer.address ? '' : ' empty'}`}>
                        {selectedCustomer.address || 'Not on file'}
                      </span>
                    </div>
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">City</span>
                      <span className={`tp-contact-summary-row-val${selectedCustomer.city ? '' : ' empty'}`}>
                        {selectedCustomer.city || 'Not on file'}
                      </span>
                    </div>
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">State</span>
                      <span className={`tp-contact-summary-row-val${selectedCustomer.state ? '' : ' empty'}`}>
                        {selectedCustomer.state || 'Not on file'}
                      </span>
                    </div>
                    <div className="tp-contact-summary-row">
                      <span className="tp-contact-summary-row-lbl">Postal</span>
                      <span className={`tp-contact-summary-row-val${selectedCustomer.postalCode ? '' : ' empty'}`}>
                        {selectedCustomer.postalCode || 'Not on file'}
                      </span>
                    </div>
                  </div>
                  )}
                  {contactTab === 'social' && (() => {
                    const social = getSocial(selectedCustomer.id);
                    const platforms = [
                      { key:'facebook',  name:'Facebook',  prefix:'@', placeholder:'facebook.com/username' },
                      { key:'instagram', name:'Instagram', prefix:'@', placeholder:'@username' },
                      { key:'x',         name:'X',         prefix:'@', placeholder:'@handle' },
                      { key:'tiktok',    name:'TikTok',    prefix:'@', placeholder:'@username' },
                      { key:'linkedin',  name:'LinkedIn',  prefix:'',  placeholder:'linkedin.com/in/username' },
                      { key:'youtube',   name:'YouTube',   prefix:'',  placeholder:'@channel or channel URL' },
                    ];
                    return (
                      <div className="tp-social-list">
                        {platforms.map(p => {
                          const val = social[p.key] || '';
                          return (
                            <div className="tp-social-row" key={p.key}>
                              <div className={`tp-social-icon ${p.key}`}>
                                <Icon name={p.key} size={15}/>
                              </div>
                              <div className="tp-social-info">
                                <div className="tp-social-name">{p.name}</div>
                                <input
                                  className="tp-social-input"
                                  type="text"
                                  value={val}
                                  placeholder={p.placeholder}
                                  onChange={e => setSocialHandle(selectedCustomer.id, p.key, e.target.value)}
                                />
                              </div>
                              <span className={`tp-social-status${val ? ' has-value' : ''}`}>
                                {val ? (
                                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                    <path d="M3.5 8.5l3 3 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                  </svg>
                                ) : (
                                  <Icon name="pencil" size={11}/>
                                )}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              );
            })()}

            <div className="tp-summary-card">
              <div className="tp-summary-total">
                <span className="tp-summary-total-label">Total TouchPoints</span>
                <span className="tp-summary-total-value">{selectedTimeline.length}</span>
              </div>
              <div className="tp-summary-divider"></div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div className="tp-summary-pill neon">
                  <div className="tp-summary-pill-row">
                    <span className="tp-summary-pill-label" style={{color:'#3db832'}}>Transactions</span>
                    <span className="tp-summary-pill-value" style={{color:'#3db832'}}>{groupCount(['sales','service_txn'])}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'flex-end'}}>
                    <span style={{fontFamily:'var(--font-subheading)',fontSize:11,fontWeight:600,color:'#3db832'}}>{sumAmount(['sales','service_txn'])}</span>
                  </div>
                </div>
                <div className="tp-summary-pill purple">
                  <div className="tp-summary-pill-row">
                    <span className="tp-summary-pill-label" style={{color:'#7E54D9'}}>Conversions</span>
                    <span className="tp-summary-pill-value" style={{color:'#7E54D9'}}>{groupCount(['service_appt','appointment','followup','phone_call','link_click'])}</span>
                  </div>
                </div>
                <div className="tp-summary-pill citrine">
                  <div className="tp-summary-pill-row">
                    <span className="tp-summary-pill-label" style={{color:'#b8930b'}}>Engagements</span>
                    <span className="tp-summary-pill-value" style={{color:'#b8930b'}}>{groupCount(['text_inbound','text_outbound'])}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Transactions group */}
            <div>
              <div className="tp-group-head" onClick={() => setCollapsed(s => ({...s, transactions: !s.transactions}))}>
                <span className="tp-group-head-label">Transactions</span>
                <span style={{opacity:0.5, transform: collapsed.transactions ? 'rotate(-90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                  <Icon name="chevronDown" size={13}/>
                </span>
              </div>
              {!collapsed.transactions && (
                <div className="tp-group-body">
                  {['sales','service_txn'].map((t, i) => (
                    <div className="tp-group-row" key={t}>
                      <div className="tp-group-row-main">
                        <div className="tp-group-row-icon neon"><Icon name={TP_TYPE[t].icon} size={16}/></div>
                        <div style={{minWidth:0}}>
                          <div className="tp-group-row-title">{TP_TYPE[t].label}</div>
                          <div className="tp-group-row-desc">{t === 'sales' ? 'Vehicle sales' : 'Invoiced visits'}</div>
                        </div>
                        <div className="tp-group-row-count neon">{countFor(t)}</div>
                      </div>
                      <div className="tp-group-row-amt">
                        <span style={{fontFamily:'var(--font-subheading)',fontSize:10,opacity:0.55,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Amount</span>
                        <span style={{fontFamily:'var(--font-display)',fontSize:13,fontWeight:700,textAlign:'right',color:'#3db832'}}>{amtFor(t)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Conversions group */}
            <div>
              <div className="tp-group-head" onClick={() => setCollapsed(s => ({...s, conversions: !s.conversions}))}>
                <span className="tp-group-head-label">Conversions</span>
                <span style={{opacity:0.5, transform: collapsed.conversions ? 'rotate(-90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                  <Icon name="chevronDown" size={13}/>
                </span>
              </div>
              {!collapsed.conversions && (
                <div className="tp-group-body">
                  {[
                    {key:'service_appt', desc:'Scheduled & completed'},
                    {key:'appointment',  desc:'Sales & general'},
                    {key:'followup',     desc:'Agent follow-ups'},
                    {key:'phone_call',   desc:'Inbound & outbound'},
                    {key:'link_click',   desc:'Campaign links'},
                  ].map(({key,desc}) => (
                    <div className="tp-group-row" key={key}>
                      <div className="tp-group-row-main">
                        <div className="tp-group-row-icon purple"><Icon name={TP_TYPE[key].icon} size={16}/></div>
                        <div style={{minWidth:0}}>
                          <div className="tp-group-row-title">{key === 'appointment' ? 'Sales Appointment' : TP_TYPE[key].label}</div>
                          <div className="tp-group-row-desc">{desc}</div>
                        </div>
                        <div className="tp-group-row-count purple">{countFor(key)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Engagements group */}
            <div>
              <div className="tp-group-head" onClick={() => setCollapsed(s => ({...s, engagements: !s.engagements}))}>
                <span className="tp-group-head-label">Engagements</span>
                <span style={{opacity:0.5, transform: collapsed.engagements ? 'rotate(-90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                  <Icon name="chevronDown" size={13}/>
                </span>
              </div>
              {!collapsed.engagements && (
                <div className="tp-group-body">
                  {[
                    {key:'text_inbound',  desc:'Received messages'},
                    {key:'text_outbound', desc:'Sent messages'},
                  ].map(({key,desc}) => (
                    <div className="tp-group-row" key={key}>
                      <div className="tp-group-row-main">
                        <div className="tp-group-row-icon citrine"><Icon name={TP_TYPE[key].icon} size={16}/></div>
                        <div style={{minWidth:0}}>
                          <div className="tp-group-row-title">{TP_TYPE[key].label}</div>
                          <div className="tp-group-row-desc">{desc}</div>
                        </div>
                        <div className="tp-group-row-count citrine">{countFor(key)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Vehicles group */}
            <div>
              <div className="tp-group-head" onClick={() => setCollapsed(s => ({...s, vehicles: !s.vehicles}))}>
                <span className="tp-group-head-label">Vehicles</span>
                <div className="tp-group-head-actions">
                  <button
                    className="tp-add-vehicle-btn"
                    title="Add vehicle"
                    onClick={e => {
                      e.stopPropagation();
                      setShowAddVehicle(v => !v);
                      setCollapsed(s => ({...s, vehicles: false}));
                    }}
                  >
                    <Icon name="plus" size={11}/>
                  </button>
                  <span style={{opacity:0.5, transform: collapsed.vehicles ? 'rotate(-90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                    <Icon name="chevronDown" size={13}/>
                  </span>
                </div>
              </div>
              {!collapsed.vehicles && (
                <div className="tp-group-body">
                  {allVehiclesForDisplay.map(v => {
                    const sharedIn = !!v._sharedFrom;
                    return (
                    <div className="tp-group-row tp-vehicle-row" key={v.id + (sharedIn ? '_shared-from-'+v._sharedFrom.id : '')}>
                      {sharedIn && (
                        <div className="tp-vehicle-shared-note" style={{marginBottom:6}}>
                          <Icon name="accountCheck" size={11}/>
                          <span>Shared from {v._sharedFrom.name}</span>
                        </div>
                      )}
                      <div className="tp-vehicle-header">
                        <div className="tp-vehicle-vin">
                          {v.vin}{[v.year, v.make, v.model].filter(Boolean).length > 0 && (
                            <span className="tp-vehicle-ymm-inline">
                              {' — ' + [v.year, v.make, v.model].filter(Boolean).join(' ')}
                            </span>
                          )}
                        </div>
                        {!sharedIn && (
                          <button
                            className="tp-vehicle-remove-btn"
                            onClick={() => removeVehicle(v.id)}
                            title="Remove vehicle"
                          >
                            <Icon name="close" size={11}/>
                          </button>
                        )}
                      </div>
                      <div className="tp-vehicle-body" style={{marginTop:10}}>
                        <div className="tp-vehicle-icon-col">
                          <div className={`tp-group-row-icon ${sharedIn ? 'azure' : 'amber'}`}>
                            <Icon name="car" size={20}/>
                          </div>
                          {sharedIn ? (
                            <span className="tp-vehicle-badge shared" title={`Shared from ${v._sharedFrom.name}`}>Shared</span>
                          ) : (
                            <button
                              className={`tp-vehicle-badge ${v.owned ? 'owned' : 'traded'}`}
                              onClick={() => toggleOwnership(v.id)}
                              title="Click to toggle ownership status"
                            >
                              {v.owned ? 'Owned' : 'Traded'}
                            </button>
                          )}
                        </div>
                        <div className="tp-vehicle-dates">
                          <div className="tp-vehicle-date-item">
                            <span className="tp-vehicle-date-lbl">Purchase Date:</span>
                            <span className={`tp-vehicle-date-val${v.purchaseDate ? '' : ' empty'}`}>{fmtVehicleDate(v.purchaseDate) || '—'}</span>
                          </div>
                          <div className="tp-vehicle-date-item">
                            <span className="tp-vehicle-date-lbl">Last Service:</span>
                            <span className={`tp-vehicle-date-val${v.lastServiceDate ? '' : ' empty'}`}>{fmtVehicleDate(v.lastServiceDate) || '—'}</span>
                          </div>
                          <div className="tp-vehicle-date-item">
                            <span className="tp-vehicle-date-lbl">Trade Date:</span>
                            <span className={`tp-vehicle-date-val${v.tradeDate ? '' : ' empty'}`}>{fmtVehicleDate(v.tradeDate) || '—'}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                    );
                  })}
                  {allVehiclesForDisplay.length === 0 && !showAddVehicle && (
                    <div style={{padding:'16px 14px', textAlign:'center', opacity:0.4}}>
                      <div style={{fontSize:11, fontFamily:'var(--font-subheading)'}}>No vehicles on file</div>
                    </div>
                  )}
                  {showAddVehicle && (
                    <div className="tp-add-vehicle-form">
                      <div className="tp-avf-group">
                        <label className="tp-avf-label">VIN</label>
                        <input
                          className="tp-avf-input"
                          placeholder="e.g. 1HGCM82633A004352"
                          value={newVehicle.vin}
                          onChange={e => setNewVehicle(p => ({...p, vin: e.target.value}))}
                          maxLength={17}
                          style={{textTransform:'uppercase', fontFamily:'monospace'}}
                        />
                      </div>
                      <div className="tp-avf-row tp-avf-3col">
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Year</label>
                          <input className="tp-avf-input" placeholder="2024" value={newVehicle.year}
                            onChange={e => setNewVehicle(p => ({...p, year: e.target.value}))} maxLength={4}/>
                        </div>
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Make</label>
                          <input className="tp-avf-input" placeholder="Honda" value={newVehicle.make}
                            onChange={e => setNewVehicle(p => ({...p, make: e.target.value}))}/>
                        </div>
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Model</label>
                          <input className="tp-avf-input" placeholder="Accord" value={newVehicle.model}
                            onChange={e => setNewVehicle(p => ({...p, model: e.target.value}))}/>
                        </div>
                      </div>
                      <div className="tp-avf-row tp-avf-3col">
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Purchase Date</label>
                          <input className="tp-avf-input" placeholder="01/15/2024" value={newVehicle.purchaseDate}
                            onChange={e => setNewVehicle(p => ({...p, purchaseDate: e.target.value}))}/>
                        </div>
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Last Service</label>
                          <input className="tp-avf-input" placeholder="04/23/2026" value={newVehicle.lastServiceDate}
                            onChange={e => setNewVehicle(p => ({...p, lastServiceDate: e.target.value}))}/>
                        </div>
                        <div className="tp-avf-group">
                          <label className="tp-avf-label">Trade Date</label>
                          <input className="tp-avf-input" placeholder="MM/DD/YYYY (optional)" value={newVehicle.tradeDate}
                            onChange={e => setNewVehicle(p => ({...p, tradeDate: e.target.value}))}/>
                        </div>
                      </div>
                      <div className="tp-avf-actions">
                        <button className="tp-avf-btn-cancel" onClick={() => {
                          setShowAddVehicle(false);
                          setNewVehicle({ vin:'', year:'', make:'', model:'', purchaseDate:'', lastServiceDate:'', tradeDate:'' });
                        }}>Cancel</button>
                        <button
                          className="tp-avf-btn-add"
                          onClick={addVehicle}
                          disabled={!newVehicle.vin.trim()}
                        >Add Vehicle</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Associated Contacts group */}
            <div>
              <div className="tp-group-head" onClick={() => setCollapsed(s => ({...s, associated: !s.associated}))}>
                <span className="tp-group-head-label">Associated Contacts</span>
                <div className="tp-group-head-actions">
                  <button
                    className="tp-add-vehicle-btn"
                    title="Associate contact"
                    onClick={e => {
                      e.stopPropagation();
                      setShowAddContact(true);
                      setCollapsed(s => ({...s, associated: false}));
                    }}
                  >
                    <Icon name="plus" size={11}/>
                  </button>
                  <span style={{opacity:0.5, transform: collapsed.associated ? 'rotate(-90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                    <Icon name="chevronDown" size={13}/>
                  </span>
                </div>
              </div>
              {!collapsed.associated && (
                <div className="tp-assoc-stack">
                  {customerAssociations.map(assoc => {
                    const other = customers.find(c => c.id === assoc.otherId);
                    if (!other) return null;
                    const props = getContactProps(other.id);
                    const isEditingEmail = editing.contactId === other.id && editing.field === 'email';
                    const isEditingDob   = editing.contactId === other.id && editing.field === 'dob';
                    return (
                      <div className="tp-contact-card" key={other.id}>
                        {/* Header: contact tile mirroring TouchPoints list item */}
                        <div className="tp-contact-header">
                          <div className="tp-contact-av">{other.initials}</div>
                          <div style={{minWidth:0, flex:1}}>
                            <div className="tp-contact-name">{other.name}</div>
                            <div className="tp-contact-phone">{other.phone}</div>
                          </div>
                          <button
                            className="tp-vehicle-remove-btn"
                            onClick={() => removeAssociation(other.id)}
                            title="Disassociate contact"
                            style={{opacity: 1}}
                          >
                            <Icon name="close" size={11}/>
                          </button>
                        </div>

                        {/* Editable Email + DOB */}
                        <div className="tp-contact-props">
                          {/* Email row */}
                          <div className="tp-contact-prop-row">
                            <span className="tp-contact-prop-icon"><Icon name="mail" size={13}/></span>
                            <span className="tp-contact-prop-lbl">Email</span>
                            {isEditingEmail ? (
                              <input
                                type="email"
                                className="tp-contact-prop-input"
                                value={emailDraft}
                                placeholder="name@example.com"
                                autoFocus
                                onChange={e => setEmailDraft(e.target.value)}
                                onBlur={() => {
                                  updateContactProp(other.id, 'email', emailDraft.trim());
                                  setEditing({ contactId:null, field:null });
                                }}
                                onKeyDown={e => {
                                  if (e.key === 'Enter') {
                                    updateContactProp(other.id, 'email', emailDraft.trim());
                                    setEditing({ contactId:null, field:null });
                                  } else if (e.key === 'Escape') {
                                    setEditing({ contactId:null, field:null });
                                  }
                                }}
                              />
                            ) : (
                              <button
                                className={`tp-contact-prop-val${props.email ? '' : ' empty'}`}
                                onClick={() => {
                                  setEmailDraft(props.email || '');
                                  setEditing({ contactId: other.id, field: 'email' });
                                }}
                                title="Click to edit email"
                              >{props.email || 'Add email…'}</button>
                            )}
                          </div>

                          {/* DOB row */}
                          <div className="tp-contact-prop-row">
                            <span className="tp-contact-prop-icon"><Icon name="calendarCheck" size={13}/></span>
                            <span className="tp-contact-prop-lbl">DOB</span>
                            <button
                              className={`tp-contact-prop-val${props.dob ? '' : ' empty'}`}
                              onClick={(e) => isEditingDob ? closeDobPicker() : openDobPicker(e, other.id)}
                              title="Click to set date of birth"
                            >{props.dob ? fmtDobDisplay(props.dob) : 'Set date of birth…'}</button>
                          </div>
                        </div>

                        {/* Shared vehicles section — shows the OTHER contact's vehicles;
                            a checked vehicle means that contact is sharing it with the viewed contact */}
                        <div className="tp-contact-shared">
                          <div className="tp-contact-shared-lbl">
                            <Icon name="car" size={11}/>
                            <span>Shared Vehicles</span>
                          </div>
                          {(() => {
                            // Vehicles owned by the associated contact (other)
                            const otherVehicles = vehiclesMap[other.id] || [];
                            // The entry on other's side that points back to selectedId
                            const otherAssocEntry = (associationsMap[other.id] || []).find(a => a.otherId === selectedId);
                            const otherSharedIds = otherAssocEntry ? otherAssocEntry.sharedVehicleIds : [];
                            if (otherVehicles.length === 0) {
                              return <div className="tp-contact-shared-empty">No vehicles on this contact to share.</div>;
                            }
                            return otherVehicles.map(v => {
                              const shared = otherSharedIds.includes(v.id);
                              return (
                                <div
                                  key={v.id}
                                  className={`tp-contact-share-row${shared ? ' is-shared' : ''}`}
                                  onClick={() => {
                                    // Toggle on the OTHER contact's side, sharing their vehicle with selectedId
                                    setAssociationsMap(prev => {
                                      const next = { ...prev };
                                      const otherEntries = (next[other.id] || []).map(x => {
                                        if (x.otherId !== selectedId) return x;
                                        const has = x.sharedVehicleIds.includes(v.id);
                                        return { ...x, sharedVehicleIds: has ? x.sharedVehicleIds.filter(id => id !== v.id) : [...x.sharedVehicleIds, v.id] };
                                      });
                                      // If no entry exists yet for other→selected, create one
                                      const hasEntry = otherEntries.some(x => x.otherId === selectedId);
                                      next[other.id] = hasEntry ? otherEntries : [...otherEntries, { otherId: selectedId, sharedVehicleIds: [v.id] }];
                                      return next;
                                    });
                                  }}
                                  title={shared ? 'Click to un-share' : `Click to share ${other.name.split(' ')[0]}'s vehicle`}
                                >
                                  <span className="tp-contact-share-check">
                                    {shared && (
                                      <svg width="9" height="9" viewBox="0 0 12 12" fill="none">
                                        <path d="M2.5 6.2l2.4 2.3L9.5 3.7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                      </svg>
                                    )}
                                  </span>
                                  <div className="tp-contact-share-text">
                                    <div className="tp-contact-share-ymm">{[v.year, v.make, v.model].filter(Boolean).join(' ') || 'Vehicle'}</div>
                                    <div className="tp-contact-share-vin">{v.vin}</div>
                                  </div>
                                </div>
                              );
                            });
                          })()}
                        </div>
                      </div>
                    );
                  })}

                  {customerAssociations.length === 0 && (
                    <div style={{padding:'16px 14px', textAlign:'center', opacity:0.4, border:'1px dashed var(--card-border)', borderRadius:10}}>
                      <div style={{fontSize:11, fontFamily:'var(--font-subheading)'}}>No associated contacts</div>
                    </div>
                  )}
                </div>
              )}
            </div>

          </div>
        </div>

      </div>

      {/* Floating DOB picker (position: fixed so it never gets clipped) */}
      {editing.field === 'dob' && editing.contactId != null && dobAnchor && (
        <div style={{position:'fixed', top: dobAnchor.top, left: dobAnchor.left, zIndex: 200}}>
          <MiniDatePicker
            value={getContactProps(editing.contactId).dob}
            onSelect={(iso) => {
              updateContactProp(editing.contactId, 'dob', iso);
              closeDobPicker();
            }}
            onClose={closeDobPicker}
          />
        </div>
      )}

      {/* Associate Contact Modal */}
      {showAddContact && (
        <AssociateContactModal
          candidates={candidateContacts}
          onSelect={(id) => {
            associateContact(id);
            setShowAddContact(false);
          }}
          onClose={() => setShowAddContact(false)}
        />
      )}

      {/* New Contact Modal */}
      {showNewContact && (
        <NewContactModal
          onClose={() => setShowNewContact(false)}
          lookupCustomerByPhone={lookupCustomerByPhone}
          contactPropsMap={contactPropsMap}
          vehiclesMap={vehiclesMap}
          onEditExisting={(id) => {
            setSelectedId(id);
            setShowNewContact(false);
          }}
          onSave={(data) => {
            const newId = createContact(data);
            setSelectedId(newId);
            setShowNewContact(false);
          }}
        />
      )}
    </div>
  );
};

// ─── NEW CONTACT MODAL ───────────────────────────────────────────────────────
const NewContactModal = ({ onClose, lookupCustomerByPhone, contactPropsMap, vehiclesMap, onEditExisting, onSave }) => {
  const [form, setForm] = useState({
    firstName: '',
    lastName: '',
    phone: '',
    email: '',
    dob: '',
    address: '',
    city: '',
    state: '',
    postalCode: '',
  });
  const [vehicles, setVehicles] = useState([
    { vin: '', year: '', make: '', model: '' }
  ]);

  // Phone lookup — runs as user types. We do the lookup live but it's a
  // cheap in-memory check so this is fine.
  const existingMatch = React.useMemo(
    () => lookupCustomerByPhone(form.phone),
    [form.phone, lookupCustomerByPhone]
  );

  const setField = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
  const setVehicleField = (idx, k, v) => {
    setVehicles(prev => prev.map((veh, i) => i === idx ? { ...veh, [k]: v } : veh));
  };
  const addVehicleRow = () => {
    setVehicles(prev => [...prev, { vin: '', year: '', make: '', model: '' }]);
  };
  const removeVehicleRow = (idx) => {
    setVehicles(prev => prev.length === 1 ? prev : prev.filter((_, i) => i !== idx));
  };

  // Required fields validation. Vehicles need year/make/model — VIN is optional.
  const canSave = (
    !existingMatch &&
    form.firstName.trim() &&
    form.lastName.trim() &&
    form.phone.trim() &&
    vehicles.every(v => v.year.trim() && v.make.trim() && v.model.trim())
  );

  const handleSave = () => {
    if (!canSave) return;
    onSave({ ...form, vehicles });
  };

  // Render the existing-contact found state
  const renderFoundContact = () => {
    const props = contactPropsMap[existingMatch.id] || { email: '', dob: '' };
    const veh = vehiclesMap[existingMatch.id] || [];
    return (
      <>
        <div className="nc-lookup-info">
          <div className="nc-lookup-info-icon">i</div>
          <div className="nc-lookup-info-text">
            <strong>Contact already exists.</strong> The phone number you entered
            ({form.phone}) is already associated with a contact in the system.
            New entry cannot proceed for this number.
          </div>
        </div>
        <div className="nc-found-card">
          <div className="nc-found-head">
            <div className="nc-found-av">{existingMatch.initials}</div>
            <div style={{flex:1, minWidth:0}}>
              <div className="nc-found-name">{existingMatch.name}</div>
              <div className="nc-found-phone">{existingMatch.phone}</div>
            </div>
          </div>
          <div className="nc-found-row">
            <span className="nc-found-lbl">Email</span>
            <span className={`nc-found-val${props.email ? '' : ' empty'}`}>
              {props.email || 'Not on file'}
            </span>
          </div>
          <div className="nc-found-row">
            <span className="nc-found-lbl">DOB</span>
            <span className={`nc-found-val${props.dob ? '' : ' empty'}`}>
              {props.dob ? (() => {
                const [y, m, d] = props.dob.split('-').map(Number);
                if (!y || !m || !d) return props.dob;
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return `${months[m-1]} ${String(d).padStart(2,'0')}, ${y}`;
              })() : 'Not on file'}
            </span>
          </div>
          {existingMatch.address && (
            <div className="nc-found-row">
              <span className="nc-found-lbl">Address</span>
              <span className="nc-found-val">{existingMatch.address}</span>
            </div>
          )}
          {(existingMatch.city || existingMatch.state || existingMatch.postalCode) && (
            <div className="nc-found-row">
              <span className="nc-found-lbl">Location</span>
              <span className="nc-found-val">
                {[existingMatch.city, existingMatch.state, existingMatch.postalCode].filter(Boolean).join(', ')}
              </span>
            </div>
          )}
          {veh.length > 0 && (
            <div className="nc-found-vlist">
              <div className="nc-found-lbl" style={{marginBottom:2}}>Vehicles</div>
              {veh.map(v => (
                <div className="nc-found-vehicle" key={v.id}>
                  <span>{[v.year, v.make, v.model].filter(Boolean).join(' ')}</span>
                  {v.vin && <span className="nc-found-vin">— {v.vin}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        <button
          className="nc-btn-primary"
          style={{width:'100%'}}
          onClick={() => onEditExisting(existingMatch.id)}
        >
          Edit User Contact Info
        </button>
      </>
    );
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="nc-modal" onClick={e => e.stopPropagation()}>
        <div className="nc-header">
          <div className="nc-title">Add New Contact</div>
          <button className="nc-close" onClick={onClose} title="Close">
            <Icon name="close" size={13}/>
          </button>
        </div>

        <div className="nc-body">
          {/* Phone is collected first so we can lookup before letting user proceed */}
          <div className="nc-section-label">Contact Info</div>

          <div className="nc-row cols-2">
            <div className="nc-group">
              <label className="nc-label">First Name<span className="nc-req">*</span></label>
              <input
                className="nc-input"
                value={form.firstName}
                onChange={e => setField('firstName', e.target.value)}
                placeholder="Jane"
                disabled={!!existingMatch}
              />
            </div>
            <div className="nc-group">
              <label className="nc-label">Last Name<span className="nc-req">*</span></label>
              <input
                className="nc-input"
                value={form.lastName}
                onChange={e => setField('lastName', e.target.value)}
                placeholder="Smith"
                disabled={!!existingMatch}
              />
            </div>
          </div>

          <div className="nc-row cols-2">
            <div className="nc-group">
              <label className="nc-label">Cell Phone<span className="nc-req">*</span></label>
              <input
                className="nc-input"
                value={form.phone}
                onChange={e => setField('phone', e.target.value)}
                placeholder="+1 555 123 4567"
                inputMode="tel"
                autoFocus
              />
            </div>
            <div className="nc-group">
              <label className="nc-label">Email</label>
              <input
                className="nc-input"
                type="email"
                value={form.email}
                onChange={e => setField('email', e.target.value)}
                placeholder="name@example.com"
                disabled={!!existingMatch}
              />
            </div>
          </div>

          {existingMatch ? (
            <div style={{marginTop:14}}>
              {renderFoundContact()}
            </div>
          ) : (
            <>
              <div className="nc-row cols-2">
                <div className="nc-group">
                  <label className="nc-label">Date of Birth</label>
                  <input
                    className="nc-input"
                    type="date"
                    value={form.dob}
                    onChange={e => setField('dob', e.target.value)}
                  />
                </div>
                <div className="nc-group">
                  <label className="nc-label">Address</label>
                  <input
                    className="nc-input"
                    value={form.address}
                    onChange={e => setField('address', e.target.value)}
                    placeholder="123 Main St"
                  />
                </div>
              </div>

              <div className="nc-row cols-addr">
                <div className="nc-group">
                  <label className="nc-label">City</label>
                  <input
                    className="nc-input"
                    value={form.city}
                    onChange={e => setField('city', e.target.value)}
                    placeholder="Austin"
                  />
                </div>
                <div className="nc-group">
                  <label className="nc-label">State</label>
                  <input
                    className="nc-input"
                    value={form.state}
                    onChange={e => setField('state', e.target.value.toUpperCase().slice(0,2))}
                    placeholder="TX"
                    maxLength={2}
                  />
                </div>
                <div className="nc-group">
                  <label className="nc-label">Postal Code</label>
                  <input
                    className="nc-input"
                    value={form.postalCode}
                    onChange={e => setField('postalCode', e.target.value)}
                    placeholder="78701"
                    maxLength={10}
                  />
                </div>
              </div>

              <div className="nc-section-label">Vehicle Info</div>

// ─── ASSOCIATE CONTACT MODAL ─────────────────────────────────────────────────
const AssociateContactModal = ({ candidates, onSelect, onClose }) => {
  const [query, setQuery] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  const q = query.trim().toLowerCase();
  const qDigits = q.replace(/\D/g, '');
  const filtered = !q ? candidates : candidates.filter(c => {
    const nameMatch = c.name.toLowerCase().includes(q);
    // Phone match only fires when the query has actual digits — otherwise
    // every contact would match because ''.includes('') is true in JS.
    const phoneDigits = c.phone.replace(/\D/g, '');
    const phoneMatch = qDigits.length > 0 && phoneDigits.includes(qDigits);
    return nameMatch || phoneMatch;
  });

  // Highlight matched portion of a string
  const highlight = (text) => {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return text;
    return (
      <>
        {text.slice(0, idx)}
        <mark style={{background:'var(--accent-light)', color:'var(--accent)', borderRadius:3, padding:'0 1px'}}>
          {text.slice(idx, idx + q.length)}
        </mark>
        {text.slice(idx + q.length)}
      </>
    );
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="nc-modal" style={{width:460, maxHeight:'80vh'}} onClick={e => e.stopPropagation()}>
        <div className="nc-header">
          <div className="nc-title">Associate a Contact</div>
          <button className="nc-close" onClick={onClose} title="Close">
            <Icon name="close" size={13}/>
          </button>
        </div>

        {/* Search input */}
        <div style={{padding:'12px 16px', borderBottom:'1px solid var(--card-border)', flexShrink:0}}>
          <div style={{position:'relative'}}>
            <span style={{
              position:'absolute', left:10, top:'50%', transform:'translateY(-50%)',
              color:'var(--text-tertiary)', pointerEvents:'none', display:'flex', alignItems:'center'
            }}>
              <Icon name="search" size={13}/>
            </span>
            <input
              ref={inputRef}
              className="nc-input"
              style={{paddingLeft:32}}
              placeholder="Search by name or phone number…"
              value={query}
              onChange={e => setQuery(e.target.value)}
            />
          </div>
          <div style={{
            marginTop:6, fontSize:11, fontFamily:'var(--font-subheading)',
            color:'var(--text-tertiary)'
          }}>
            {candidates.length === 0
              ? 'All contacts are already associated.'
              : filtered.length === 0 && q
                ? `No contacts match "${query}"`
                : `${filtered.length} contact${filtered.length !== 1 ? 's' : ''} found`}
          </div>
        </div>

        {/* Results list */}
        <div style={{overflowY:'auto', flex:1, padding:'8px'}}>
          {filtered.length === 0 && candidates.length > 0 && (
            <div style={{
              padding:'40px 20px', textAlign:'center',
              color:'var(--text-tertiary)', fontFamily:'var(--font-subheading)', fontSize:12
            }}>
              No contacts match your search.

          {filtered.map(c => (
            <div
              key={c.id}
              onClick={() => onSelect(c.id)}
              style={{
                display:'flex', alignItems:'center', gap:12,
                padding:'10px 12px', borderRadius:10, cursor:'pointer',
                transition:'background 0.10s',
              }}
              onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-light)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}

// ─── MINI CHART PREVIEWS for dashboard cards ─────────────────────────────────
const MiniChart = ({ color, type = 'line' }) => {
  const d = [3,5,4,7,6,8,7,9];
  if (type === 'bar') return (
    <svg width="100%" height="100%" viewBox="0 0 80 40" preserveAspectRatio="none">
      {d.map((v,i) => <rect key={i} x={i*10+1} y={40-v*4} width="8" height={v*4} fill={color} fillOpacity="0.7" rx="1"/>)}
    </svg>
  );
  if (type === 'area') {
    const pts = d.map((v,i) => `${i*11.4},${40-v*4}`).join(' ');
    const area = `0,40 ${pts} ${(d.length-1)*11.4},40`;
    return (
      <svg width="100%" height="100%" viewBox="0 0 80 40" preserveAspectRatio="none">
        <polygon points={area} fill={color} fillOpacity="0.15"/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );
  }
  if (type === 'pie') return (
    <svg width="100%" height="100%" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="16" fill="none" stroke={color} strokeWidth="10" strokeOpacity="0.2"/>
      <circle cx="20" cy="20" r="16" fill="none" stroke={color} strokeWidth="10" strokeDasharray="60 40" strokeDashoffset="25"/>
    </svg>
  );
  const pts = d.map((v,i) => `${i*11.4},${40-v*4}`).join(' ');
  return (
    <svg width="100%" height="100%" viewBox="0 0 80 40" preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};
