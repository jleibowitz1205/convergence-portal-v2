  // xDateGroup: 'Day'|'Week'|'Month'|'Quarter'|'Year'
  const [xDateGroup, setXDateGroup] = useState(editReport?.xDateGroup || 'Month');
  // Stable unique id generator for metric objects so React keys / chart series
  // identity stay attached to the right metric even after add/remove/reorder.
  const midCounter = React.useRef(0);
  const newMid = () => `m${Date.now().toString(36)}_${midCounter.current++}`;

  // yMetrics: array of {mid, field, agg, comboType} objects
  const [yMetrics, setYMetrics] = useState(
    (editReport?.yMetrics && editReport.yMetrics.length
      ? editReport.yMetrics
      : [{field:'Year', agg:'count', comboType:'bar'}]
    ).map((m, i) => m.mid ? m : { ...m, mid: `m_init_${i}` })
  );
  const [groupBy, setGroupBy] = useState(editReport?.groupBy || []);
  const [filters, setFilters] = useState(editReport?.filters || []);
  const [step, setStep] = useState(1);
  const [reportName, setReportName] = useState(editReport?.name || 'New Report');
  const [editingName, setEditingName] = useState(false);
  // activeTarget: 'x' | 'y' | null — which drop zone is "focused" for next field click
  const [activeTarget, setActiveTarget] = useState('x');
  // tableColumns: ordered list of column names selected for Table chart
  const [tableColumns, setTableColumns] = useState(editReport?.tableColumns || []);
  // drag state for table column reordering
  const [dragIdx, setDragIdx] = useState(null);
  // drag state for filter row reordering (step 3): {id, fromGroupId|null}
  const [filterDragId, setFilterDragId] = useState(null);
  const [filterDropTarget, setFilterDropTarget] = useState(null); // {id, position:'before'|'after'}
  // resizable panel
  const [panelWidth, setPanelWidth] = useState(280);
  const resizeRef = React.useRef(null);

  // display settings (step 4)
  const [subtitle, setSubtitle] = useState(editReport?.subtitle || '');
  // seriesColors[i] = hex color for series/slice i
  const [seriesColors, setSeriesColors] = useState(editReport?.seriesColors || ['#5E10BC','#22c55e','#f59e0b','#ec4899','#14b8a6']);
  // seriesSizes[i] = 'sm' | 'md' | 'lg' — bar width / line thickness for series i
  const [seriesSizes, setSeriesSizes] = useState(editReport?.seriesSizes || []);
  const [selectedSeriesIdx, setSelectedSeriesIdx] = useState(0);
  const [yAxisFormat, setYAxisFormat] = useState(editReport?.yAxisFormat || 'number');
  const [legendPos, setLegendPos] = useState(editReport?.legendPos || 'bottom');
  const [showDataPoints, setShowDataPoints] = useState(editReport?.showDataPoints || false);

  // Helper: get color for a series index, falling back through defaults
  const DEFAULT_COLORS = ['#5E10BC','#22c55e','#f59e0b','#ec4899','#14b8a6','#8b5cf6','#ef4444','#0ea5e9'];
  const getSeriesColor = (i) => seriesColors[i] || DEFAULT_COLORS[i % DEFAULT_COLORS.length];
  const setSeriesColor = (i, hex) => setSeriesColors(prev => {
    const next = [...prev];
    while (next.length <= i) next.push(DEFAULT_COLORS[next.length % DEFAULT_COLORS.length]);
    next[i] = hex;
    return next;
  });

  // Per-series sizing — 'md' is the default. Maps to a bar width (px) and a
  // line/area stroke width (px) used by the chart renderers.
  const getSeriesSize = (i) => seriesSizes[i] || 'md';
  const setSeriesSize = (i, size) => setSeriesSizes(prev => {
    const next = [...prev];
    while (next.length <= i) next.push('md');
    next[i] = size;
    return next;
  });
  const BAR_SIZE_PX    = { sm: 12, md: 22, lg: 38 };
  const STROKE_SIZE_PX = { sm: 1.5, md: 3, lg: 6 };
  const getBarSize    = (i) => BAR_SIZE_PX[getSeriesSize(i)] || BAR_SIZE_PX.md;
  const getStrokeSize = (i) => STROKE_SIZE_PX[getSeriesSize(i)] || STROKE_SIZE_PX.md;

  // Resolve how series `i` is actually drawn on the current chart:
  // returns 'bar' | 'line' | 'area' | null. For combo charts this respects
  // each metric's per-series comboType (so a metric switched to a line plot
  // is correctly treated as a line, not a bar).
  const getSeriesRenderType = (i) => {
    if (chartType === 'bar' || chartType === 'row') return 'bar';
    if (chartType === 'line') return 'line';
    if (chartType === 'area') return 'area';
    if (chartType === 'combo') return yMetrics[i]?.comboType || 'bar';
    return null;
  };
  // Sizing only applies to bar/line/area series.
  const getSeriesSizeKind = (i) => {
    const rt = getSeriesRenderType(i);
    if (rt === 'bar') return 'bar';
    if (rt === 'line' || rt === 'area') return 'line';
    return null;
  };

  const onResizeMouseDown = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = panelWidth;
    const onMove = (me) => {
      const next = Math.min(520, Math.max(200, startW + me.clientX - startX));
      setPanelWidth(next);
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (resizeRef.current) resizeRef.current.classList.remove('dragging');
    };
    if (resizeRef.current) resizeRef.current.classList.add('dragging');
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const currentDB = DATABASES.find(d => d.id === selectedDB);
  const currentTable = currentDB?.tables.find(t => t.name === selectedTable);

  const chartTypes = [
    {id:'bar',   icon:'bars',      label:'Bar'},
    {id:'row',   icon:'rowBars',   label:'Row'},
    {id:'line',  icon:'lineChart', label:'Line'},
    {id:'area',  icon:'area',      label:'Area'},
    {id:'combo', icon:'combo',     label:'Combo'},
    {id:'pie',   icon:'pie',       label:'Pie'},
    {id:'number',icon:'number',    label:'KPI'},
    {id:'table', icon:'table',     label:'Table'},
  ];

  const hasAxis = AXIS_CHART_TYPES.includes(chartType);
  const isPie    = chartType === 'pie';
  const isKPI    = chartType === 'number';

  // Determine if selected X field is a date
  const xCol = currentTable?.cols.find(c => c.name === xAxis);
  const xIsDate = xCol?.type === 'date';

  // Virtual "Row Count" field always available as a numeric
  const ROW_COUNT_FIELD = {name:'Row Count', type:'num', virtual:true};

  // All cols + Row Count virtual
  const allColsWithRowCount = [ROW_COUNT_FIELD, ...(currentTable?.cols || [])];

  // Numeric cols only (for Y axis and KPI) — always includes Row Count
  const numericCols = allColsWithRowCount.filter(c => c.type === 'num');

  // X-eligible cols: str and date (not num)
  const xEligibleCols = currentTable?.cols.filter(c => c.type !== 'num') || [];

  const addYMetric = (field) => {
    const defaultAgg = field === 'Row Count' ? 'count' : 'sum';
    setYMetrics(prev => [...prev, {mid: newMid(), field, agg: defaultAgg, comboType: 'bar'}]);
  };

  const removeYMetric = (idx) => setYMetrics(prev => prev.filter((_,i) => i !== idx));

  const updateYMetric = (idx, patch) => setYMetrics(prev => prev.map((m,i) => i===idx ? {...m,...patch} : m));

  // For pie "Summary" — the field placed in yMetrics[0] acts as the breakout dimension
  // We show its known distinct values as breakout items (using sample rows from DATABASES)
  const pieBreakoutField = isPie ? (yMetrics[0]?.field || null) : null;
  const PIE_SLICE_COLORS = ['var(--chart-1)','var(--chart-2)','var(--chart-3)','var(--chart-4)','var(--chart-5)'];
  const getPieBreakoutValues = () => {
    if (!pieBreakoutField || pieBreakoutField === 'Row Count') return [];
    const col = currentTable?.cols.find(c => c.name === pieBreakoutField);
    if (!col) return [];
    const colIdx = currentTable.cols.indexOf(col);
    const db = currentDB;
    const seen = new Set();
    const vals = [];
    for (const row of (db?.rows || [])) {
      const v = String(row[colIdx] ?? '');
      if (v && !seen.has(v)) { seen.add(v); vals.push(v); }
    }
    return vals;
  };

  // Per-series scaling factor — so multiple metrics on the same chart look distinct
  // even when the underlying base data is the same. Series 0 = full scale, others
  // proportionally smaller in a consistent pattern.
  const SERIES_SCALE = [1.0, 0.72, 0.54, 0.38, 0.85, 0.62, 0.45, 0.30];
  const getSeriesScale = (i) => SERIES_SCALE[i % SERIES_SCALE.length];

  // Compute the displayed value for a single (metric, base) pair.
  // baseVal is the "raw" sample value for the row; we scale it by the series index
  // (so different metrics show different curves) and then apply the aggregation
  // transformation so the displayed number reflects sum/avg/min/max/etc.
  const getSeriesValue = (metric, baseVal, seriesIdx) => {
    const scaled = Math.round(baseVal * getSeriesScale(seriesIdx));
    return applyAgg(scaled, metric?.agg || 'sum');
  };

  // Dynamic bar/row preview data — N series, one per yMetric, all aggregation-aware.
  // Each row contains: { xLabel, s0, s1, s2, ... sN-1 } keyed by series index.
  const getBarData = () => {
    // Determine the base numeric value for each X tick
    let baseRows = [];
    if (xIsDate) {
      baseRows = getTimeSeriesData().map(d => ({ xLabel: d.label, base: d.leads }));
    } else {
      const col = currentTable?.cols.find(c => c.name === xAxis);
      const colName = xAxis || 'Category';
      let labels = [];
      if (col && currentTable) {
        const colIdx = currentTable.cols.indexOf(col);
        const seen = new Set();
        for (const row of (currentDB?.rows || [])) {
          const v = String(row?.[colIdx] ?? '');
          if (v && !seen.has(v)) { seen.add(v); labels.push(v); }
          if (labels.length >= 5) break;
        }
      }
      if (labels.length < 3) {
        labels = [`${colName} A`, `${colName} B`, `${colName} C`, `${colName} D`, `${colName} E`];
      }
      const baseScale = [124, 98, 87, 62, 53];
      baseRows = labels.slice(0, 5).map((lbl, i) => ({ xLabel: lbl, base: baseScale[i] * 1000 }));
    }

    // Generate a row per X tick with one key per yMetric (s0, s1, s2, ...)
    // If no yMetrics, fall back to a single default series so the chart isn't empty.
    const effectiveMetrics = yMetrics.length > 0 ? yMetrics : [{field:'Value', agg:'sum', comboType:'bar'}];
    return baseRows.map(({xLabel, base}) => {
      const row = { xLabel };
      effectiveMetrics.forEach((m, i) => {
        row[`s${i}`] = getSeriesValue(m, base, i);
      });
      return row;
    });
  };

  const previewData = [
    {source:'Organic',   value:124000, value2:88000},
    {source:'Paid Search',value:98000, value2:61000},
    {source:'Direct',    value:87000,  value2:54000},
    {source:'Social',    value:62000,  value2:37000},
    {source:'Referral',  value:53000,  value2:29000},
  ];

  const formatYValue = (v) => {
    if (yAxisFormat === 'currency') return `$${v >= 1000 ? (v/1000).toFixed(0)+'k' : v}`;
    if (yAxisFormat === 'percent') return `${v}%`;
    if (yAxisFormat === 'compact') return v >= 1000000 ? `${(v/1000000).toFixed(1)}M` : v >= 1000 ? `${(v/1000).toFixed(0)}K` : `${v}`;
    return `${v}`;
  };

  // Apply aggregation transformation to a base numeric value for a given series/metric.
  // Since preview data is sample-based, we simulate realistic agg variants:
  //   count    → row count proxy (base / 1000, floored, min 1)
  //   avg      → base / realistic divisor to simulate per-record average
  //   min      → ~60% of base
  //   max      → base (max is already the peak)
  //   distinct → small integer proportional to base
  //   stddev   → ~18% of base
  //   cumsum   → base * 1.4 (running total grows)
  //   cumcount → row-count proxy * 1.4
  //   sum      → base as-is (sum is the default unit)
  const applyAgg = (baseVal, agg) => {
    switch (agg) {
      case 'count':    return Math.max(1, Math.round(baseVal / 1000));
      case 'avg':      return Math.round(baseVal / 42);
      case 'min':      return Math.round(baseVal * 0.58);
      case 'max':      return baseVal;
      case 'distinct': return Math.max(1, Math.round(baseVal / 15000));
      case 'stddev':   return Math.round(baseVal * 0.18);
      case 'cumsum':   return Math.round(baseVal * 1.4);
      case 'cumcount': return Math.max(1, Math.round((baseVal / 1000) * 1.4));
      case 'sum':
      default:         return baseVal;
    }
  };

  // Generate sample time-series data that matches the selected xDateGroup
  const getTimeSeriesData = () => {
    switch (xDateGroup) {
      case 'Day':
        return Array.from({length:14}, (_,i) => ({
          label: `May ${i+1}`,
          leads: 18+Math.round(Math.sin(i*0.7)*8+Math.random()*6),
          sales: 3+Math.round(Math.sin(i*0.5)*2+Math.random()*2),
          revenue: 82000+Math.round(Math.sin(i*0.6)*20000+Math.random()*15000),
        }));
      case 'Week':
        return Array.from({length:12}, (_,i) => ({
          label: `Wk ${i+1}`,
          leads: 60+Math.round(Math.sin(i*0.6)*25+Math.random()*20),
          sales: 12+Math.round(Math.sin(i*0.5)*5+Math.random()*5),
          revenue: 290000+Math.round(Math.sin(i*0.55)*80000+Math.random()*60000),
        }));
      case 'Quarter':
        return [
          {label:'Q1',leads:616,sales:127,revenue:3152000},
          {label:'Q2',leads:773,sales:174,revenue:4338000},
          {label:'Q3',leads:920,sales:211,revenue:5256000},
          {label:'Q4',leads:1094,sales:255,revenue:6357000},
        ];
      case 'Year':
        return Array.from({length:5}, (_,i) => ({
          label: `${2020+i}`,
          leads: 1800+i*420+Math.round(Math.random()*200),
          sales: 340+i*82+Math.round(Math.random()*40),
          revenue: 8400000+i*2100000+Math.round(Math.random()*400000),
        }));
      case 'Month':
      default:
        return monthlyLeads.map(d => ({label:d.month, leads:d.leads, sales:d.sales, revenue:d.revenue}));
    }
  };

  // Format a metric's display name with its aggregation: "Sum of Revenue"
  const getMetricLabel = (m, idx) => {
    if (!m) return `Series ${idx + 1}`;
    const aggLabels = {count:'Count of rows', sum:'Sum of', avg:'Avg of', distinct:'Distinct', min:'Min of', max:'Max of', stddev:'Std dev of', cumsum:'Cumulative sum of', cumcount:'Cumulative count of rows'};
    if (m.field === 'Row Count' || m.agg === 'count' || m.agg === 'cumcount') return aggLabels[m.agg] || 'Count of rows';

    if (chartType === 'line') {

      return (
        <ResponsiveContainer width="100%" height="100%">

    if (chartType === 'area') {

      const tsData = tsBase.map(d => {

      const metricSig = yMetrics.map(m => `${m.mid}:${m.field}:${m.agg}`).join('|');
      return (
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart key={metricSig} data={tsData} margin={{top:8,right:16,left:-10,bottom:0}}>
            <defs>
              {effectiveMetrics.map((_, i) => (
                <linearGradient key={i} id={`rbAreaGrad${i}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={getSeriesColor(i)} stopOpacity={0.25}/>

            <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false}/>
            <XAxis dataKey="label" tick={{fontSize:11,fill:'var(--text-tertiary)'}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fontSize:10,fill:'var(--text-tertiary)'}} axisLine={false} tickLine={false} tickFormatter={formatYValue}/>
            <Tooltip contentStyle={axisStyle} formatter={(v,name) => [formatYValue(v), name]}/>
            {effectiveMetrics.length > 1 && <Legend iconSize={8} wrapperStyle={{fontSize:'11px'}}/>}
            {effectiveMetrics.map((m, i) => (
              <Area key={m.mid || i} type="monotone" dataKey={`s${i}`} stroke={getSeriesColor(i)} strokeWidth={getStrokeSize(i)} fill={`url(#rbAreaGrad${i})`}
                dot={showDataPoints ? {r:4, fill:getSeriesColor(i), strokeWidth:0} : false}
                activeDot={{r:5}} name={getMetricLabel(m, i)} isAnimationActive={false}/>
            ))}
          </AreaChart>

    }
    if (chartType === 'combo') {
      const tsBase = getTimeSeriesData();
      const comboData = tsBase.map(d => {
        const row = { label: d.label };
        yMetrics.forEach((m, i) => {
          row[`s${i}`] = getSeriesValue(m, d.leads, i);
        });
        return row;
      });
      // Signature of all metrics — when ANY metric's field/agg/type changes,
      // this changes and forces Recharts to fully rebuild (no stale series cache).
      const metricSig = yMetrics.map(m => `${m.mid}:${m.field}:${m.agg}:${m.comboType}`).join('|');
      return (
        <ResponsiveContainer width="100%" height="100%">
          <ComposedChart key={metricSig} data={comboData} margin={{top: showDataPoints ? 20 : 8,right:16,left:-10,bottom:0}}>

            <YAxis tick={{fontSize:10,fill:'var(--text-tertiary)'}} axisLine={false} tickLine={false} tickFormatter={formatYValue}/>
            <Tooltip contentStyle={axisStyle} formatter={(v,name) => [formatYValue(v), name]}/>
            <Legend iconSize={8} wrapperStyle={{fontSize:'11px'}}/>
            {yMetrics.map((m, i) => {
              const key = `s${i}`;
              const color = getSeriesColor(i);
              const name = getMetricLabel(m, i);
              // Key includes comboType so a bar↔line↔area switch fully remounts
              // the series, and includes agg so a value change forces a re-render.
              const reactKey = `${m.mid || i}-${m.comboType}-${m.agg}`;
              if (m.comboType === 'bar') {
                return (
                  <Bar key={reactKey} dataKey={key} fill={color} barSize={getBarSize(i)} radius={[3,3,0,0]} name={name} isAnimationActive={false}>
                    {showDataPoints && <LabelList dataKey={key} position="top" formatter={formatYValue} style={{fontSize:'10px',fill:'var(--text-secondary)',fontWeight:600}}/>}
                  </Bar>
                );
              }
              if (m.comboType === 'area') {
                return <Area key={reactKey} type="monotone" dataKey={key} stroke={color} fill={color} fillOpacity={0.15} strokeWidth={getStrokeSize(i)} dot={showDataPoints ? {r:4, fill:color, strokeWidth:0} : false} activeDot={{r:5}} name={name} isAnimationActive={false}/>;
              }
              return <Line key={reactKey} type="monotone" dataKey={key} stroke={color} strokeWidth={getStrokeSize(i)} dot={showDataPoints ? {r:4, fill:color, strokeWidth:0} : false} activeDot={{r:5}} name={name} isAnimationActive={false}/>;
            })}
          </ComposedChart>
        </ResponsiveContainer>
      );
    }
    if (chartType === 'pie') {
      const breakoutVals = getPieBreakoutValues();
      const pieData = breakoutVals.length > 0
        ? breakoutVals.map((v,i) => ({name:v, value:[54,43,2,1][i] || Math.floor(50/breakoutVals.length)}))
        : trafficBySource.map(s => ({name:s.name, value:s.value}));
      const total = pieData.reduce((a,d) => a+d.value, 0);
      return (
        <div style={{display:'flex',alignItems:'center',height:'100%',gap:32}}>
          <div style={{minWidth:220,display:'flex',flexDirection:'column',gap:10}}>
            {pieData.map((d,i) => {
              const pct = total > 0 ? ((d.value/total)*100).toFixed(2)+'%' : '0.00%';
              return (
                <div key={d.name} style={{display:'flex',alignItems:'center',gap:8,fontSize:'13px',color:'var(--text-primary)'}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:getSeriesColor(i),flexShrink:0}}/>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                  <span style={{fontWeight:600,color:'var(--text-secondary)',minWidth:52,textAlign:'right'}}>{pct}</span>
                </div>
              );
            })}
          </div>
          <ResponsiveContainer width="100%" height="100%">
            <PieChart>
              <Pie data={pieData} cx="50%" cy="50%" innerRadius="42%" outerRadius="72%" paddingAngle={2} dataKey="value"
                onClick={(_, i) => { setSelectedSeriesIdx(i); }}
                label={showDataPoints ? ({cx,cy,midAngle,innerRadius,outerRadius,percent}) => {
                  if (percent < 0.04) return null;
                  const R = Math.PI/180, r = innerRadius+(outerRadius-innerRadius)*0.5;
                  const x = cx + r*Math.cos(-midAngle*R), y = cy + r*Math.sin(-midAngle*R);
                  return <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize={11} fontWeight={600}>{(percent*100).toFixed(1)}%</text>;
                } : false}
                labelLine={false}>
                {pieData.map((_,i) => <Cell key={i} fill={getSeriesColor(i)} stroke={selectedSeriesIdx===i ? '#fff' : 'none'} strokeWidth={selectedSeriesIdx===i ? 2 : 0}/>)}
              </Pie>
              <Tooltip contentStyle={{background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px'}}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
      );
    }
    if (chartType === 'number') {
      const kpiField = yMetrics[0]?.field || 'Row Count';
      const agg = yMetrics[0]?.agg || 'count';
      const aggLabel = {count:'Count of rows',sum:'Sum of',avg:'Average of',distinct:'Distinct values of',min:'Min of',max:'Max of',stddev:'Std dev of',cumsum:'Cumulative sum of',cumcount:'Cumulative count of rows'}[agg] || 'Count of rows';
      const kpiLabel = kpiField === 'Row Count' ? 'Total Row Count' : `${aggLabel} ${kpiField}`;
      // Base value pools per agg for a realistic-looking KPI
      const BASE_KPI = {count:15280, sum:4347036, avg:2840, min:158, max:589, distinct:47, stddev:312, cumsum:6083000, cumcount:21392};
      const rawVal = BASE_KPI[agg] ?? 15280;
      const kpiValue = yAxisFormat === 'currency' ? `$${rawVal >= 1000000 ? (rawVal/1000000).toFixed(2)+'M' : rawVal >= 1000 ? (rawVal/1000).toFixed(0)+'k' : rawVal}`
        : yAxisFormat === 'percent' ? `${(rawVal / BASE_KPI.count * 100).toFixed(1)}%`
        : yAxisFormat === 'compact' ? (rawVal >= 1000000 ? `${(rawVal/1000000).toFixed(1)}M` : rawVal >= 1000 ? `${(rawVal/1000).toFixed(0)}K` : `${rawVal}`)
        : rawVal.toLocaleString();
      return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:8}}>
          <div style={{fontFamily:'var(--font-display)',fontSize:'64px',fontWeight:700,color:getSeriesColor(0),letterSpacing:'-2px',lineHeight:1}}>
            {kpiValue}
          </div>
          <div style={{fontSize:'14px',color:'var(--text-secondary)',fontWeight:500}}>{kpiLabel}</div>
          <div className="kpi-delta up" style={{marginTop:4}}><Icon name="arrowUp" size={11}/>+18.4% vs last period</div>
        </div>
      );
    }
    if (chartType === 'table') {
      // Determine which columns to show: user selection or sensible default
      // Default: first str column + Row Count (matching actual dataset)
      const firstStrCol = currentTable?.cols.find(c => c.type === 'str');
      const defaultCols = firstStrCol
        ? [firstStrCol.name, 'Row Count']
        : ['Row Count'];
      const cols = tableColumns.length > 0 ? tableColumns : defaultCols;

      // Build rows from actual DB rows
      const dbRows = currentDB?.rows || [];
      const colDefs = currentTable?.cols || [];

      const getCellValue = (row, colName) => {
        if (colName === 'Row Count') return null; // handled separately
        const colIdx = colDefs.findIndex(c => c.name === colName);
        if (colIdx === -1) return '—';
        return row[colIdx] != null ? String(row[colIdx]) : '—';
      };

      // For Row Count column, show a sequential row number
      const displayRows = dbRows.length > 0 ? dbRows : [];

      return (
        <div style={{overflowX:'auto',height:'100%',overflowY:'auto'}}>

    return (
      <div className="empty-state">
        <div className="empty-icon">📊</div>
        <div className="empty-title">Chart preview</div>

  };

  const sqlColX = xAxis || 'source';
  const sqlColY = yMetrics[0]?.field || 'estimated_value';
  const sqlAgg  = yMetrics[0]?.agg === 'count' ? 'COUNT(*)' : `${(yMetrics[0]?.agg || 'SUM').toUpperCase()}(${sqlColY})`;
  const sqlTable = selectedTable;

  // Build WHERE clause from new filter structure
  const buildFilterSQL = (f) => {
    if (!f.val && !['is empty','is not empty'].includes(f.op)) return null;
    const v = f.colType === 'str' ? `'${f.val}'` : f.val;
    const opMap = {'is':'=','is not':'!=','contains':`LIKE '%${f.val}%'`,'does not contain':`NOT LIKE '%${f.val}%'`,'starts with':`LIKE '${f.val}%'`,'ends with':`LIKE '%${f.val}'`,'is empty':'IS NULL','is not empty':'IS NOT NULL','=':'=','≠':'!=','>':'>','<':'<','≥':'>=','≤':'<=','is before':'<','is after':'>','is on or before':'<=','is on or after':'>=','is within':'BETWEEN'};
    if (f.op === 'is empty' || f.op === 'is not empty') return `${f.col} ${opMap[f.op]}`;
    if (f.op === 'contains' || f.op === 'does not contain' || f.op === 'starts with' || f.op === 'ends with') return `${f.col} ${opMap[f.op]}`;
    return `${f.col} ${opMap[f.op] || f.op} ${v}`;
  };
  const buildWhereClause = () => {
    const parts = [];
    filters.forEach((f, idx) => {
      const j = idx === 0 ? '' : ` ${f.junction || 'AND'} `;
      if (f.type === 'filter') {
        const sql = buildFilterSQL(f);
        if (sql) parts.push(j + sql);
      } else if (f.type === 'group' && f.conditions.length > 0) {
        const inner = f.conditions.map((c, ci) => (ci===0?'':` ${c.junction||'AND'} `) + (buildFilterSQL(c)||'')).join('');
        if (inner.trim()) parts.push(j + `(${inner.trim()})`);
      }
    });
    return parts.join('');
  };
  const whereClause = buildWhereClause();
  const sqlWhere = whereClause.trim() ? ` WHERE ${whereClause.trim()}` : '';
  const generatedSQL = `SELECT ${sqlColX}, ${sqlAgg} FROM ${sqlTable}${sqlWhere} GROUP BY ${sqlColX} ORDER BY 2 DESC`;

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="topbar">
        {/* Editable report name */}
        <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
          {editReport && (
            <span style={{fontSize:'11px',fontWeight:600,padding:'2px 8px',borderRadius:20,background:'var(--accent-light)',color:'var(--accent)',letterSpacing:'0.03em',flexShrink:0}}>EDITING</span>

            <input
              className="form-input"
              style={{width:220,padding:'4px 8px',fontSize:'14px',fontWeight:600,fontFamily:'var(--font-display)'}}
              value={reportName}
