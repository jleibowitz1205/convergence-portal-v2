  const [open, setOpen] = useState(false);
  const remaining = options.filter(o => !values.includes(o));
  return (
    <div style={{padding:'8px 0 4px'}}>
      <div style={{fontFamily:'var(--font-subheading)', fontSize:10, fontWeight:700, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6}}>{label}</div>
      <div style={{display:'flex', flexWrap:'wrap', gap:6, position:'relative'}}>
        {values.map(v => (
          <span key={v} style={{
            display:'inline-flex', alignItems:'center', gap:6,
            padding:'4px 6px 4px 10px', borderRadius:999,
            background:'rgba(94,16,188,0.12)', color:'var(--accent)',
            fontFamily:'var(--font-subheading)', fontSize:11, fontWeight:600,
          }}>
            {v}
            <button onClick={() => onChange(values.filter(x => x !== v))}
              title="Remove"
              style={{background:'transparent', border:'none', cursor:'pointer', color:'inherit', display:'inline-flex', padding:0, opacity:0.7}}>
              <Icon name="close" size={9}/>
            </button>
          </span>
        ))}
        <button onClick={() => setOpen(o => !o)}
          disabled={remaining.length === 0}
          style={{
            display:'inline-flex', alignItems:'center', gap:5,
            padding:'4px 10px', borderRadius:999,
            border:'1px dashed var(--card-border)', background:'transparent', cursor: remaining.length === 0 ? 'default' : 'pointer',
            fontFamily:'var(--font-subheading)', fontSize:11, fontWeight:600, color:'var(--text-tertiary)',
            opacity: remaining.length === 0 ? 0.4 : 1,
          }}>
          <Icon name="plus" size={9}/> Add vendor
        </button>
        {open && remaining.length > 0 && (
          <>
            <div style={{position:'fixed', inset:0, zIndex:55}} onClick={() => setOpen(false)}/>
            <div style={{
              position:'absolute', top:'calc(100% + 6px)', left:0,
              background:'var(--card-bg)', border:'1px solid var(--card-border)',
              borderRadius:10, boxShadow:'0 12px 32px rgba(0,0,0,0.18)',
              zIndex:60, maxHeight:260, overflowY:'auto', padding:4, minWidth:200,
            }}>
              {remaining.map(o => (
                <button key={o}
                  onClick={() => { onChange([...values, o]); setOpen(false); }}
                  style={{
                    width:'100%', textAlign:'left', padding:'6px 10px',
                    border:'none', background:'transparent', cursor:'pointer',
                    borderRadius:6, fontFamily:'var(--font-subheading)', fontSize:12, color:'var(--text-primary)',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background='var(--badge-bg)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  {o}
                </button>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
};

const HomeScreen = ({ tweaks }) => {
  const TODAY = HOME_TODAY;
  const chartStyle = tweaks?.chartStyle || 'filled';

  // Date filter — DateRangeDropdown contract
  const [dateFilter, setDateFilter] = useState({ datePreset:'prev_30', label:'Previous 30 Days' });
  const [datePickerOpen, setDatePickerOpen] = useState(false);
  const [datePickerPos, setDatePickerPos] = useState({ top:0, left:0 });

  // Calendar nav (independent of the date filter)
  const [calMonth, setCalMonth] = useState(new Date(2026, 4, 1));
  const [selectedEvent, setSelectedEvent] = useState(null);

  // ── Right rail: editable User Info + Company info ──
  const [userInfo,   setUserInfo]    = useState(HOME_USER_DEFAULT);
  const [companyInfo,setCompanyInfo] = useState(HOME_COMPANY_DEFAULT);

  // ── Tools area (main panel) ──
  const [activeTool, setActiveTool] = useState('optin');
  const [copiedKey,  setCopiedKey]  = useState(null);
  const [optInForm,  setOptInForm]  = useState({ firstName:'', lastName:'', email:'', mobile:'' });
  const [optInChecks,setOptInChecks]= useState({ transactional:false, promotional:false });
  const copyToClip = (key, text) => {
    try { (navigator.clipboard && navigator.clipboard.writeText(text)) || (() => {
      const ta = document.createElement('textarea'); ta.value = text;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    })(); } catch (e) {}
    setCopiedKey(key);
    setTimeout(() => setCopiedKey(k => k === key ? null : k), 1600);
  };
  const clearOptIn = () => {
    setOptInForm({ firstName:'', lastName:'', email:'', mobile:'' });
    setOptInChecks({ transactional:false, promotional:false });
  };
  const optInUrl   = `https://portal.convergenceauto.com/opt_in/${companyInfo.clientKey}`;
  const optInEmbed = `<iframe src="https://embed.convergenceauto.com/?widget=optin&client-key=${companyInfo.clientKey}" style="width: 100%; height: 100%;"></iframe>`;

  // TextMe Chat Widget
  const [widgetShown, setWidgetShown] = useState(false);
  const widgetInboxId = 'e8fdc313-ce39-4c9f-8140-1db01837a0aa';
  const widgetBrandId = 'ca55e2e6-00de-4909-959b-d6f2b16d9d57';
  const widgetAvatar  = 'https://assets.messagemgr.com/img/stock-headshot-female-01.jpg';
  const widgetPopup   = 'Hi! How can we help you? \ud83d\udc4b';
  const widgetEmbed   = `<script id="textme-widget-js" type="text/javascript" src="https://assets.messagemgr.com/js/textme-widget.js" async defer data-inbox="${widgetInboxId}" data-brand="${widgetBrandId}" data-color="" data-avatar="${widgetAvatar}" data-popup="${widgetPopup}"><\/script>`;

  // Phone Lookup
  const [phoneLookupInput,   setPhoneLookupInput]   = useState('');
  const [phoneLookupLoading, setPhoneLookupLoading] = useState(false);
  const [phoneLookupError,   setPhoneLookupError]   = useState('');
  const [phoneLookupResult,  setPhoneLookupResult]  = useState(null);
  // E.164 = leading '+' then 1–15 digits, first digit 1–9.
  const E164_RE = /^\+[1-9]\d{1,14}$/;
  const isValidE164 = (v) => E164_RE.test((v || '').trim());

  const runPhoneLookup = async () => {
    const num = (phoneLookupInput || '').trim();
    setPhoneLookupError('');
    setPhoneLookupResult(null);
    if (!isValidE164(num)) {
      setPhoneLookupError('Please enter a phone number in E.164 format (e.g. +16192451678).');
      return;
    }
    setPhoneLookupLoading(true);
    try {
      // Replace with the production endpoint once available.
      const res = await fetch(`/api/phone-lookup?number=${encodeURIComponent(num)}`);
      if (!res.ok) throw new Error(`Lookup failed (HTTP ${res.status})`);
      const data = await res.json();
      setPhoneLookupResult(data);
    } catch (err) {
      // Fall back to a demo payload so the UI can be exercised before the API is wired up.
      setPhoneLookupResult({
        validatedNumber:          num,
        validatedNumberFormatted: num,
        status:                   'mobile',
        type:                     'mobile',
        carrier:                  'CELLCO PARTNERSHIP DBA VERIZON WIRELESS - CA',
        carrierParent:            'Verizon',
        carrierChangedDt:         'December 30, 2019, 12:00 AM',
        previousCarrier:          'NEW CINGULAR WIRELESS PCS, LLC - GA',
        blacklisted:              'False',
      });
      setPhoneLookupError('Showing sample response — live lookup service not reachable from this preview.');
    } finally {
      setPhoneLookupLoading(false);
    }
  };

  const clearPhoneLookup = () => {
    setPhoneLookupInput('');
    setPhoneLookupError('');
    setPhoneLookupResult(null);
  };

  // ── Phone Lookup — Bulk list (CSV) ──
  // Schema for the bulk lookup output (also used as headers in the downloaded CSV)
  const LOOKUP_FIELD_DEFS = [
    { key:'validatedNumber',          label:'Validated Number' },
    { key:'validatedNumberFormatted', label:'Validated Number Formatted' },
    { key:'status',                   label:'Status' },
    { key:'type',                     label:'Type' },
    { key:'carrier',                  label:'Carrier' },
    { key:'carrierParent',            label:'Carrier Parent' },
    { key:'carrierChangedDt',         label:'Carrier Changed Dt' },
    { key:'previousCarrier',          label:'Previous Carrier' },
    { key:'blacklisted',              label:'Blacklisted' },
  ];

  const phoneListFileInputRef = useRef(null);
  const [csvImportOpen, setCsvImportOpen] = useState(false);
  const [csvImportData, setCsvImportData] = useState(null); // { fileName, headers, rows }
  const [csvHasHeaders, setCsvHasHeaders] = useState(true);
  const [csvPhoneCol,   setCsvPhoneCol]   = useState('');
  const [csvIncludedCols, setCsvIncludedCols] = useState({});
  const [csvImportError,  setCsvImportError]  = useState('');
  const [lookupJobs, setLookupJobs] = useState([]); // { id, fileName, status:'processing'|'completed', total, completed, includedCols, phoneCol, rows, results, createdAt }

  // Minimal CSV parser that handles quoted fields and embedded commas/newlines.
  const parseCsv = (text) => {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i+1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else { field += c; }
      } else {
        if (c === '"') { inQuotes = true; }
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n' || c === '\r') {
          if (c === '\r' && text[i+1] === '\n') i++;
          row.push(field); rows.push(row); row = []; field = '';
        } else { field += c; }
      }
    }
    if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
    // strip trailing empty rows
    while (rows.length && rows[rows.length-1].every(c => (c || '').trim() === '')) rows.pop();
    return rows;
  };

  // Convert any reasonable phone string to E.164 (assumes US/NANP for 10-digit inputs).
  const toE164 = (raw) => {
    if (raw === null || raw === undefined) return null;
    const s = String(raw).trim();
    if (!s) return null;
    if (s.startsWith('+')) {
      const digits = s.slice(1).replace(/\D/g, '');
      return digits ? `+${digits}` : null;
    }
    const digits = s.replace(/\D/g, '');
    if (digits.length === 10) return `+1${digits}`;
    if (digits.length === 11 && digits.startsWith('1')) return `+${digits}`;
    if (digits.length >= 8 && digits.length <= 15) return `+${digits}`;
    return null;
  };

  const openPhoneListPicker = () => {
    if (phoneListFileInputRef.current) phoneListFileInputRef.current.click();
  };

  const handlePhoneListFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ''; // allow re-selecting the same file later
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = String(ev.target.result || '');
      const parsed = parseCsv(text);
      if (!parsed.length) {
        setCsvImportError('That file appears to be empty.');
        setCsvImportOpen(true);
        setCsvImportData({ fileName: file.name, headers: [], rows: [] });
        return;
      }
      const headers = parsed[0].map((h, i) => (h && h.trim()) ? h.trim() : `Column ${i+1}`);
      const rows    = parsed.slice(1);
      setCsvImportData({ fileName: file.name, headers, rows, rawRows: parsed });
      setCsvHasHeaders(true);
      setCsvPhoneCol('');
      // default: include all columns except phone (toggled when phone is chosen)
      const initial = {};
      headers.forEach(h => { initial[h] = true; });
      setCsvIncludedCols(initial);
      setCsvImportError('');
      setCsvImportOpen(true);
    };
    reader.onerror = () => {
      setCsvImportError('Could not read that file.');
      setCsvImportOpen(true);
    };
    reader.readAsText(file);
  };

  // Recompute headers/rows from cached raw parse when "first row is headers" toggles.
  const effectiveHeaders = useMemo(() => {
    if (!csvImportData) return [];
    if (csvHasHeaders) return csvImportData.headers;
    const cols = (csvImportData.rawRows && csvImportData.rawRows[0] || []).length;
    return Array.from({ length: cols }, (_, i) => `Column ${i+1}`);
  }, [csvImportData, csvHasHeaders]);

  const effectiveRows = useMemo(() => {
    if (!csvImportData || !csvImportData.rawRows) return [];
    return csvHasHeaders ? csvImportData.rawRows.slice(1) : csvImportData.rawRows;
  }, [csvImportData, csvHasHeaders]);

  // Re-seed inclusion map when header mode changes
  useEffect(() => {
    if (!csvImportData) return;
    const next = {};
    effectiveHeaders.forEach(h => { next[h] = (h !== csvPhoneCol); });
    setCsvIncludedCols(next);
    if (csvPhoneCol && effectiveHeaders.indexOf(csvPhoneCol) === -1) setCsvPhoneCol('');
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [csvHasHeaders]);

  const closeCsvImport = () => {
    setCsvImportOpen(false);
    setCsvImportData(null);
    setCsvPhoneCol('');
    setCsvIncludedCols({});
    setCsvImportError('');
  };

  const toggleIncludedCol = (col) => {
    setCsvIncludedCols(prev => ({ ...prev, [col]: !prev[col] }));
  };

  const setPhoneColumn = (col) => {
    setCsvPhoneCol(col);
    // auto-include all non-phone columns by default; user can untoggle
    setCsvIncludedCols(prev => {
      const next = { ...prev };
      effectiveHeaders.forEach(h => {
        if (h === col) next[h] = false;
        else if (next[h] === undefined) next[h] = true;
      });
      return next;
    });
  };

  const submitPhoneList = () => {
    if (!csvImportData) return;
    if (!csvPhoneCol) {
      setCsvImportError('Please choose which column contains the phone number.');
      return;
    }
    const phoneIdx = effectiveHeaders.indexOf(csvPhoneCol);
    if (phoneIdx === -1) {
      setCsvImportError('The selected phone column is no longer in the file.');
      return;
    }
    const includedHeaders = effectiveHeaders.filter(h => csvIncludedCols[h] && h !== csvPhoneCol);
    const rowsSnapshot = effectiveRows.map(r => r.slice());
    const job = {
      id: 'job-' + Date.now() + '-' + Math.random().toString(36).slice(2,7),
      fileName: csvImportData.fileName,
      status: 'processing',
      total: rowsSnapshot.length,
      completed: 0,
      phoneCol: csvPhoneCol,
      phoneColIdx: phoneIdx,
      includedCols: includedHeaders,
      headers: effectiveHeaders.slice(),
      rows: rowsSnapshot,
      results: [],
      createdAt: Date.now(),
    };
    setLookupJobs(prev => [job, ...prev]);
    closeCsvImport();

    // Simulate processing — replace with the real bulk-lookup pipeline when wired up.
    // We tick every ~120ms, processing one row at a time so users see progress.
    const tick = (idx) => {
      if (idx >= rowsSnapshot.length) {
        setLookupJobs(prev => prev.map(j => j.id === job.id ? { ...j, status:'completed', completed: rowsSnapshot.length } : j));
        return;
      }
      const row = rowsSnapshot[idx];
      const rawPhone = row[phoneIdx];
      const e164 = toE164(rawPhone);
      // Stub lookup result — in production, await an API call here.
      const result = e164 ? {
        validatedNumber:          e164,
        validatedNumberFormatted: e164,
        status:                   'mobile',
        type:                     'mobile',
        carrier:                  'CELLCO PARTNERSHIP DBA VERIZON WIRELESS - CA',
        carrierParent:            'Verizon',
        carrierChangedDt:         'December 30, 2019, 12:00 AM',
        previousCarrier:          'NEW CINGULAR WIRELESS PCS, LLC - GA',
        blacklisted:              'False',
      } : {
        validatedNumber:          '',
        validatedNumberFormatted: '',
        status:                   'invalid',
        type:                     '',
        carrier:                  '',
        carrierParent:            '',
        carrierChangedDt:         '',
        previousCarrier:          '',
        blacklisted:              '',
      };
      setLookupJobs(prev => prev.map(j => {
        if (j.id !== job.id) return j;
        const results = j.results.slice();
        results[idx] = result;
        return { ...j, results, completed: idx + 1 };
      }));
      setTimeout(() => tick(idx + 1), 120);
    };
    setTimeout(() => tick(0), 150);
  };

  // CSV download for a completed job
  const csvEscape = (v) => {
    const s = (v === null || v === undefined) ? '' : String(v);
    return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };

  const downloadJobCsv = (job) => {
    const headers = [...job.includedCols, ...LOOKUP_FIELD_DEFS.map(f => f.label)];
    const lines = [headers.map(csvEscape).join(',')];
    for (let i = 0; i < job.rows.length; i++) {
      const row = job.rows[i];
      const r   = job.results[i] || {};
      const includedVals = job.includedCols.map(h => row[job.headers.indexOf(h)]);
      const lookupVals   = LOOKUP_FIELD_DEFS.map(f => r[f.key]);
      lines.push([...includedVals, ...lookupVals].map(csvEscape).join(','));
    }
    const blob = new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const base = (job.fileName || 'phone-lookup').replace(/\.csv$/i, '');
    a.href = url;
    a.download = `${base}-lookup-results.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const removeJob = (id) => setLookupJobs(prev => prev.filter(j => j.id !== id));

  const [expanded,   setExpanded]    = useState({ company:true, account:false, technical:false });
  const toggleExpanded = (k) => setExpanded(p => ({ ...p, [k]: !p[k] }));
  const updateUser    = (patch) => setUserInfo(u => ({ ...u, ...patch }));
  const updateCompany = (patch) => setCompanyInfo(c => ({ ...c, ...patch }));
  const updateAddress = (patch) => setCompanyInfo(c => ({ ...c, address:{ ...c.address, ...patch } }));

  // ── Chart aggregates ──
  const transactionsByType = useMemo(() => {
    const sales   = HOME_TRANSACTIONS.filter(t => t.dataType === 'sales').length;
    const service = HOME_TRANSACTIONS.filter(t => t.dataType === 'service').length;
    return [
      { name:'Sales',   value:sales,   color:'#5E10BC' },
      { name:'Service', value:service, color:'#80E55C' },
    ];
  }, []);
  const transactionsTotal = transactionsByType.reduce((s,d) => s + d.value, 0);

  const phoneCallsByLine = useMemo(() => {
    const cnt = HOME_PHONE_CALLS.reduce((a,c) => (a[c.lineType] = (a[c.lineType]||0)+1, a), {});
    return [
      { lineType:'Sales Line',   value:cnt['Sales Line']   || 0, color:'#5E10BC' },
      { lineType:'Service Line', value:cnt['Service Line'] || 0, color:'#7E54D9' },
      { lineType:'Recall Line',  value:cnt['Recall Line']  || 0, color:'#F7E749' },
    ];
  }, []);

  // ── Calendar event index ──
  const eventsByDate = useMemo(() => {
    const map = new Map();
    HOME_CALENDAR_ITEMS.forEach(item => {
      const arr = map.get(item.date) || [];
      arr.push(item);
      map.set(item.date, arr);
    });
    return map;
  }, []);

  // ── Calendar helpers ──
  const dKey = (d) => {
    if (!d) return null;
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const isSameDayLocal = (a,b) => a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  const colorFor = (item) => {
    if (item.kind === 'service') return { bg:'#F7E749', fg:'#5b4900' };
    const et = (item.eventType || '').toLowerCase();
    if (et.includes('follow up'))   return { bg:'#80E55C', fg:'#1f4d10' };
    if (et.includes('appointment')) return { bg:'#7E54D9', fg:'#ffffff' };
    return { bg:'#7E54D9', fg:'#ffffff' };
  };

  const openDatePicker = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setDatePickerPos({ top: rect.bottom + 8, left: Math.max(8, rect.right - 222) });
    setDatePickerOpen(true);
  };

  // Pie slice label — shows percentage inside each slice
  const renderPieLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
    if (!percent || percent < 0.04) return null;
    const RADIAN = Math.PI / 180;
    const r = innerRadius + (outerRadius - innerRadius) * 0.55;
    const x = cx + r * Math.cos(-midAngle * RADIAN);
    const y = cy + r * Math.sin(-midAngle * RADIAN);
    return (
      <text x={x} y={y} fill="#ffffff"
        fontFamily="var(--font-display)" fontWeight="700" fontSize="13"
        textAnchor="middle" dominantBaseline="central"
        style={{textShadow:'0 1px 2px rgba(0,0,0,0.25)'}}>
        {(percent * 100).toFixed(0)}%
      </text>
    );
  };

  return (
    <div className="screen" style={{display:'flex', flexDirection:'column', height:'100%'}}>
      <div className="topbar"><div className="topbar-title" style={{marginLeft:48}}>Home</div></div>

                    // giving the outer overflow:auto one consistent scroll track to follow.
                    const innerMinWidth =

                      RECORD_LABEL_W +
                      DIVIDER_W +
                      DIVIDER_GAP +
                      previewCols.reduce((sum, _, i) => {
                        const isLast = i === previewCols.length - 1;
                        return sum + COL_W + (isLast ? 0 : COL_GAP);

                      if (s == null) return '';
                      const str = String(s);
                      return str.length > n ? str.slice(0, n - 1) + '…' : str;
                    };

                      <div style={{minWidth: innerMinWidth, display:'flex', flexDirection:'column', gap:8}}>

                              paddingRight: DIVIDER_GAP, marginRight: DIVIDER_GAP,
                              borderRight:'1px solid var(--card-border)',

                                const isPhone = col.header === csvPhoneCol;
                                const isLast  = cIdx === previewCols.length - 1;
                                const raw     = row[col.idx];
                                const value   = (raw === null || raw === undefined) ? '' : String(raw).trim();

                                return (
                                  <div key={cIdx} style={{
                                    flexShrink: 0,
                                    // Last column grows freely — no clipping on either header or value.
                                    // All others are fixed COL_W so headers line up perfectly row-to-row.
                                    width: isLast ? undefined : COL_W,
                                    flex: isLast ? '0 0 auto' : '0 0 ' + COL_W + 'px',
                                    overflow: isLast ? 'visible' : 'hidden',
                                    display:'flex', flexDirection:'column', gap:3,

                                      padding:'2px 7px', borderRadius:4,

                                      whiteSpace:'nowrap',

                                      textOverflow: isLast ? 'unset' : 'ellipsis',

                                    <span title={value} style={{
                                      display:'block',
                                      fontFamily: isPhone ? 'ui-monospace, SFMono-Regular, Menlo, monospace' : 'var(--font-body)',
                                      fontSize: 12.5,
                                      color: value === '' ? 'var(--text-tertiary)' : 'var(--text-primary)',

                                      whiteSpace: isLast ? 'normal' : 'nowrap',

                                      textOverflow: isLast ? 'unset' : 'ellipsis',
                                    }}>
                                      {value === '' ? '—' : value}
                                    </span>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        ))}
                      </div>

                  Submit List
                </button>
              </div>
            </div>
          </div>
          <style>{`
            @keyframes pl-fade-in { from { opacity: 0; } to { opacity: 1; } }
            @keyframes pl-slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
          `}</style>
        </div>
      )}
    </div>
  );
};

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
// TrafficGauge sub-screens (its internal app routes — Library/Dashboards, Report
// Builder, Data Sources, Starred). The other top-level Convergence sections
// (Pipelines, Portfolio, TouchPoints, Weave) live as siblings of the TG group.
const TG_SUB_SCREENS = ['library','questions','datasources','starred','dashboard','builder'];

const Sidebar = ({ screen, navigate, sidebarMode, dealer, setDealer, onOpenStyle, styleOpen }) => {
  const collapsed = sidebarMode === 'collapsed';
  const hidden = sidebarMode === 'hidden';

  // TrafficGauge group is open when any TG sub-screen is active; persist UI
  // collapsed/expanded state so users can manually open/close it too.
  const tgIsActive = TG_SUB_SCREENS.indexOf(screen) !== -1;
  const [tgOpen, setTgOpen] = useState(tgIsActive);
  useEffect(() => { if (tgIsActive) setTgOpen(true); }, [tgIsActive]);

  // Top-level Convergence portal nav items
  const topItems = [
    { id:'home',        icon:'home',       label:'Home' },
    { id:'pipelines',   icon:'database',   label:'Pipelines' },
    { id:'touchpoints', icon:'star',       label:'TouchPoints' },
  ];
  const bottomItems = [
    { id:'portfolio',   icon:'grid',       label:'Portfolio' },
    { id:'weave',       icon:'phone',      label:'Weave' },
  ];

  // TrafficGauge sub-nav items (preserved from TrafficGauge V1)
  const tgItems = [
    { id:'library',     icon:'home',       label:'Dashboards' },
    { id:'questions',   icon:'chart',      label:'Report Builder', badge:'12' },
    { id:'datasources', icon:'database',   label:'Data Sources' },
    { id:'starred',     icon:'star',       label:'Starred' },
  ];

  const renderItem = (item) => (
    <div key={item.id}
      className={`nav-item${screen === item.id ? ' active' : ''}`}
      onClick={() => navigate(item.id)}
      title={collapsed ? item.label : undefined}>
      <span className="nav-icon"><Icon name={item.icon} size={16}/></span>
      {!collapsed && <span>{item.label}</span>}
      {!collapsed && item.badge && <span className="nav-badge">{item.badge}</span>}
    </div>
  );

  return (
    <nav className={`sidebar${collapsed?' collapsed':''}${hidden?' hidden':''}`}>
      {/* Logo */}
      <div className="sidebar-logo" style={{justifyContent: collapsed ? 'center' : 'flex-start'}}>
        {collapsed ? (
          <div className="logo-mark" style={{background:"linear-gradient(135deg,#5E10BC,#7E54D9)",borderRadius:"8px",fontSize:"13px",letterSpacing:"-0.5px"}}>C</div>
        ) : (
          <img
            src="assets/logo-horizontal.png"
            alt="Convergence"
            onError={(e) => { e.currentTarget.style.display='none'; e.currentTarget.nextSibling.style.display='flex'; }}
            style={{height:'24px', width:'auto', maxWidth:'172px', objectFit:'contain', display:'block', filter:'brightness(0) invert(1)'}}
          />
        )}
        <div style={{display:'none',alignItems:'center',gap:8}}>
          <div className="logo-mark" style={{background:'var(--accent)'}}>C</div>
          <span className="logo-name">CONVERGENCE</span>
        </div>
      </div>

      {/* Dealership selector */}
      {!collapsed && (
        <div className="sb-dealer-wrap">
          <select className="sb-dealer" value={dealer} onChange={e => setDealer(e.target.value)}>
            {CX_DEALERS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
      )}

      {/* Customer card */}
      {!collapsed && (
        <div className="sb-customer">
          <div className="sb-customer-row">
            <div className="sb-customer-av">{CX_CURRENT_CUSTOMER.initials}</div>
            <div style={{minWidth:0,flex:1}}>
              <div className="sb-customer-name">{CX_CURRENT_CUSTOMER.name}</div>
              <div className="sb-customer-id">{CX_CURRENT_CUSTOMER.id}</div>
            </div>
            <button
              className={`style-btn${styleOpen ? ' active' : ''}`}
              onClick={onOpenStyle}
              title="Appearance settings"
              style={{flexShrink:0}}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </div>
          <div className="sb-customer-meta">
            <div>
              <span style={{color:'rgba(255,255,255,0.45)',display:'inline-flex'}}><Icon name="cellphone" size={13}/></span>
              <span>{CX_CURRENT_CUSTOMER.phone}</span>
            </div>
            <div>
              <span style={{color:'rgba(255,255,255,0.45)',display:'inline-flex'}}><Icon name="mail" size={13}/></span>
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{CX_CURRENT_CUSTOMER.email}</span>
            </div>
          </div>
        </div>
      )}

      {/* Nav items */}
      <div className="sidebar-nav">
        {!collapsed && <div className="nav-section-label">Workspace</div>}
        {topItems.map(renderItem)}

        {/* TrafficGauge group — collapsible */}
        {collapsed ? (
          // In collapsed sidebar, just render the parent item as a single icon
          // that navigates to the TG library (dashboards) entry point.
          <div
            className={`nav-item${tgIsActive ? ' active' : ''}`}
            onClick={() => navigate('library')}
            title="TrafficGauge">
            <span className="nav-icon"><Icon name="bars" size={16}/></span>
          </div>
        ) : (
          <>
            <div
              className={`nav-group-toggle${tgOpen ? ' open' : ''}${tgIsActive ? ' has-active' : ''}`}
              onClick={() => setTgOpen(o => !o)}>
              <span className="nav-icon"><Icon name="bars" size={16}/></span>
              <span>TrafficGauge</span>
              <span className="nav-chev"><Icon name="chevronDown" size={13}/></span>
            </div>
            <div className={`nav-sub${tgOpen ? ' open' : ''}`}>
              {tgItems.map(renderItem)}
            </div>
          </>
        )}

        {bottomItems.map(renderItem)}
      </div>


    </nav>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "default",
  "density": "comfortable",
  "chartStyle": "filled",
  "sidebarMode": "expanded",
  "customAccent": "",
  "customNavBg": "",
  "fontDisplay": "",
  "fontSubheading": "",
  "fontBody": ""
}/*EDITMODE-END*/;

const App = () => {
  // Default landing screen: Home (snapshot dashboard across all data sources).
  const [screen, setScreen] = useState('home');
  const [activeDashboard, setActiveDashboard] = useState(null);
  const [savedReports, setSavedReports] = useState([]);
  const [userDashboards, setUserDashboards] = useState([]);
  const [editingReport, setEditingReport] = useState(null);
  const [dealer, setDealer] = useState(CX_DEALERS[0]);
  // Integrations enabled from the Pipelines → Integrations tab. Each id maps to
  // an entry in INTEGRATIONS_CATALOG that may carry a `dbDef` — those defs are
  // merged into Data Sources alongside the built-in DATABASES.
  const [enabledIntegrations, setEnabledIntegrations] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cx_integrations') || '[]'); }
    catch { return []; }
  });
  // When navigating to Data Sources, optionally hint which db to focus on.
  const [pendingDataSource, setPendingDataSource] = useState(null);
  const extraDataSources = useMemo(() =>
    INTEGRATIONS_CATALOG
      .filter(i => enabledIntegrations.includes(i.id) && i.dbDef)
      .map(i => i.dbDef),
  [enabledIntegrations]);
  const handleEnableIntegration = useCallback((id) => {
    setEnabledIntegrations(prev => {
      if (prev.includes(id)) return prev;
      const next = [...prev, id];
      try { localStorage.setItem('cx_integrations', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // ── Lead Providers (Pipelines → Integrations → Lead Providers) ─────────────
  // Each provider: { id, name, dataType:'adf'|'json', fields:[{path, type}],
  // sample:string, filters:Filter[] (same shape as Report Builder step 3).
  const [leadProviders, setLeadProviders] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cx_lead_providers') || '[]'); }
    catch { return []; }
  });
  const persistLeadProviders = useCallback((next) => {
    try { localStorage.setItem('cx_lead_providers', JSON.stringify(next)); } catch {}
    return next;
  }, []);
  const handleAddLeadProvider = useCallback((provider) => {
    setLeadProviders(prev => persistLeadProviders([...prev, provider]));
  }, [persistLeadProviders]);
  const handleUpdateLeadProvider = useCallback((id, patch) => {
    setLeadProviders(prev => persistLeadProviders(
      prev.map(p => p.id === id ? { ...p, ...patch } : p)
    ));
  }, [persistLeadProviders]);
  const handleDeleteLeadProvider = useCallback((id) => {
    setLeadProviders(prev => persistLeadProviders(prev.filter(p => p.id !== id)));
  }, [persistLeadProviders]);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [styleOpen, setStyleOpen] = useState(false);

  // ── Persisted widget layouts (keyed by dashboard id or 'default') ──────────
  // Shape: { [dashKey]: DEFAULT_WIDGET_LAYOUT[] }
  const [widgetLayouts, setWidgetLayouts] = useState(() => {
    try {
      const stored = localStorage.getItem('tg_widget_layouts');
      return stored ? JSON.parse(stored) : {};
    } catch { return {}; }
  });

  // Derive the layout for the currently active dashboard.
  // For user-created dashboards with a linked report that haven't been laid out yet,
  // seed the layout with that report as a widget so it enters the grid system.
  const dashKey = activeDashboard?.id ?? 'default';
  const activeWidgetLayout = React.useMemo(() => {
    const stored = widgetLayouts[dashKey];
    if (stored) return stored;
    // No saved layout — build the default
    if (activeDashboard?.userCreated) {
      const linkedReport = activeDashboard?.report;
      if (linkedReport) {
        return [{ id: `report-${linkedReport.id}`, label: linkedReport.name, colSpan: 12, rowSpan: 6, type: 'report', report: linkedReport }];
      }
      return []; // blank user dashboard
    }
    return DEFAULT_WIDGET_LAYOUT; // built-in Sales Performance dashboard
  }, [widgetLayouts, dashKey, activeDashboard]);

  const handleWidgetLayoutChange = useCallback((updater) => {
    setWidgetLayouts(prev => {
      const current = prev[dashKey] ?? DEFAULT_WIDGET_LAYOUT;
      const next = typeof updater === 'function' ? updater(current) : updater;
      const updated = { ...prev, [dashKey]: next };
      try { localStorage.setItem('tg_widget_layouts', JSON.stringify(updated)); } catch {}
      return updated;
    });
  }, [dashKey]);

  const handleSaveReport = useCallback((report) => {
    setSavedReports(prev => {
      const exists = prev.find(r => r.id === report.id);
      if (exists) return prev.map(r => r.id === report.id ? report : r);
      return [report, ...prev];
    });
    setEditingReport(null);
  }, []);

  const navigate = useCallback((target, data) => {
    if (target === 'dashboard') { setActiveDashboard(data); setScreen('dashboard'); }
    else if (target === 'library') setScreen('library');
    else if (target === 'builder') setScreen('builder');
    else if (target === 'datasources') {
      if (data && data.dbId) setPendingDataSource(data.dbId);
      setScreen('datasources');
    }
    else if (target === 'questions') { setEditingReport(null); setScreen('questions'); }
    else setScreen(target);
  }, []);

  const handleDeleteReport = useCallback((id) => {
    setSavedReports(prev => prev.filter(r => r.id !== id));
  }, []);

  const handleDeleteDashboard = useCallback((id) => {
    setUserDashboards(prev => prev.filter(d => d.id !== id));
  }, []);

  const handleEditReport = useCallback((report) => {
    setEditingReport(report);
    setScreen('questions');
  }, []);

  const handleCreateDashboard = useCallback((dashData) => {
    setUserDashboards(prev => [dashData, ...prev]);
    navigate('dashboard', dashData);
  }, [navigate]);

  useEffect(() => {
    document.body.setAttribute('data-theme', tweaks.theme === 'default' ? '' : tweaks.theme);
    document.body.setAttribute('data-density', tweaks.density);
    // Re-apply custom CSS var overrides after theme changes.
    // Accent is handled by the persistent <style id="__custom-accent-style"> injected
    // by StylePanel — it uses !important so it wins over [data-theme] selectors.
    if (tweaks.customNavBg)  document.documentElement.style.setProperty('--sidebar-bg', tweaks.customNavBg);
    if (tweaks.fontDisplay)  document.documentElement.style.setProperty('--font-display', tweaks.fontDisplay);
    if (tweaks.fontSubheading) document.documentElement.style.setProperty('--font-subheading', tweaks.fontSubheading);
    if (tweaks.fontBody)     document.documentElement.style.setProperty('--font-body', tweaks.fontBody);
  }, [tweaks.theme, tweaks.density, tweaks.customAccent, tweaks.customNavBg, tweaks.fontDisplay, tweaks.fontSubheading, tweaks.fontBody]);

  const renderScreen = () => {
    switch (screen) {
      // ── Convergence top-level sections ──
      case 'home':        return <HomeScreen tweaks={tweaks}/>;
      case 'pipelines':   return <PipelinesScreen navigate={navigate} enabledIntegrations={enabledIntegrations} onEnableIntegration={handleEnableIntegration} leadProviders={leadProviders} onAddLeadProvider={handleAddLeadProvider} onUpdateLeadProvider={handleUpdateLeadProvider} onDeleteLeadProvider={handleDeleteLeadProvider} dealer={dealer}/>;
      case 'portfolio':   return <PortfolioScreen/>;
      case 'touchpoints': return <TouchPointsScreen/>;
      case 'weave':       return <WeaveScreen/>;
      // ── TrafficGauge sub-screens ──
      case 'library': return <LibraryScreen navigate={navigate} tweaks={tweaks} savedReports={savedReports} userDashboards={userDashboards} onCreateDashboard={handleCreateDashboard} onDeleteReport={handleDeleteReport} onDeleteDashboard={handleDeleteDashboard} onEditReport={handleEditReport}/>;
      case 'dashboard': return <DashboardScreen navigate={navigate} dashboard={activeDashboard} tweaks={tweaks} savedReports={savedReports} widgetLayout={activeWidgetLayout} onWidgetLayoutChange={handleWidgetLayoutChange}/>;
      case 'builder': return <BuilderScreen navigate={navigate} tweaks={tweaks}/>;
      case 'questions': return <ReportBuilderScreen navigate={navigate} tweaks={tweaks} onSaveReport={handleSaveReport} editReport={editingReport}/>;
      case 'datasources': return <DataSourcesScreen navigate={navigate} extraDataSources={extraDataSources} initialDB={pendingDataSource}/>;
      default: return (
        <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
          <div className="topbar"><div className="topbar-title">{screen.charAt(0).toUpperCase()+screen.slice(1)}</div></div>
          <div className="page-body"><div className="empty-state" style={{paddingTop:80}}>
            <div className="empty-icon">🚧</div>
            <div className="empty-title">Coming Soon</div>
            <div className="empty-desc">This section is under construction.</div>
          </div></div>
        </div>
      );
    }
  };

  return (
    <div className="app-shell" data-theme={tweaks.theme === 'default' ? '' : tweaks.theme} data-density={tweaks.density}>
      <Sidebar screen={screen} navigate={navigate} sidebarMode={tweaks.sidebarMode} dealer={dealer} setDealer={setDealer} onOpenStyle={() => setStyleOpen(true)} styleOpen={styleOpen}/>
      <StylePanel open={styleOpen} onClose={() => setStyleOpen(false)} tweaks={tweaks} setTweak={setTweak}/>
      <div className="main-area">
        {/* Sidebar toggle in topbar */}
        <div style={{position:'absolute',top:12,left: tweaks.sidebarMode==='hidden'?12 : tweaks.sidebarMode==='collapsed'?72:252,zIndex:20,transition:'left 0.25s cubic-bezier(0.4,0,0.2,1)'}}>
          <button className="topbar-toggle" onClick={() => {
            if (tweaks.sidebarMode==='expanded') setTweak('sidebarMode','collapsed');
            else if (tweaks.sidebarMode==='collapsed') setTweak('sidebarMode','hidden');
            else setTweak('sidebarMode','expanded');
          }}>
            <Icon name="menu" size={14}/>
          </button>
        </div>
        {renderScreen()}
      </div>

      <TweaksPanel>
        <TweakSection label="Theme">
          <TweakSelect
            label="Color Theme"
            value={tweaks.theme}
            options={[{label:'Electric (Default)',value:'default'},{label:'Neon',value:'sage'},{label:'Dark Mode',value:'dark'}]}
            onChange={v => setTweak('theme', v)}
          />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio
            label="Sidebar"
            value={tweaks.sidebarMode}
            options={[{label:'Full',value:'expanded'},{label:'Icons',value:'collapsed'},{label:'Hidden',value:'hidden'}]}
            onChange={v => setTweak('sidebarMode', v)}
          />
          <TweakRadio
            label="Density"
            value={tweaks.density}
            options={[{label:'Compact',value:'compact'},{label:'Default',value:'comfortable'},{label:'Spacious',value:'spacious'}]}
            onChange={v => setTweak('density', v)}
          />
        </TweakSection>
        <TweakSection label="Charts">
          <TweakRadio
            label="Chart Style"
            value={tweaks.chartStyle}
            options={[{label:'Filled',value:'filled'},{label:'Outlined',value:'outlined'},{label:'Minimal',value:'minimal'}]}
            onChange={v => setTweak('chartStyle', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
